; Vale configuration for the DxMessaging documentation surface.
;
; The custom JS validator scripts/validate-docs-prose.js is the authoritative
; source for the banned-phrase list. Vale runs alongside it in CI to catch
; structural prose problems (passive voice, sentence complexity, capitalization)
; that regex cannot easily express.
;
; See .llm/skills/documentation/human-prose-policy.md for the policy.

StylesPath = .vale/styles

Packages = write-good

MinAlertLevel = warning

Vocab = DxMessaging

[*.md]
BasedOnStyles = Vale, DxMessaging, write-good

; Exclude inline code spans, fenced code blocks, and HTML attributes from
; prose scanning. Vale's TokenIgnores and BlockIgnores accept regular
; expressions delimited with parentheses.
TokenIgnores = (`[^`]+`)
BlockIgnores = (?s)(```.*?```)

; The DxMessaging skill files describe the policy itself, so the marketing,
; hedge, and filler rules cannot reasonably apply. Capitalization rules are
; still enforced.
[.llm/skills/documentation/*.md]
BasedOnStyles = DxMessaging
DxMessaging.Marketing = NO
DxMessaging.Hedges = NO
DxMessaging.LLMFiller = NO

; CHANGELOG.md legitimately uses "comprehensive" for release notes, so the
; marketing rule is muted there.
[CHANGELOG.md]
DxMessaging.Marketing = NO

; Scan only XML doc comments inside .cs sources. Anything that is not a ///
; line is treated as a block to ignore.
[*.cs]
BasedOnStyles = DxMessaging
BlockIgnores = (?m)^[^/].*$, (?m)^/[^/].*$, (?m)^//[^/].*$
