name: Unity Tests

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version. Empty = full matrix."
        required: false
        default: ""
        type: string
      test-mode:
        description: "Pin a single test mode."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - editmode
          - playmode

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  matrix-config:
    name: Resolve Unity test matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
      test-modes: ${{ steps.resolve.outputs.test-modes }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
          INPUT_TEST_MODE: ${{ inputs.test-mode }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
          else
            versions='["2021.3.45f1","2022.3.45f1","6000.0.32f1"]'
          fi
          if [ -n "${INPUT_TEST_MODE:-}" ] && [ "${INPUT_TEST_MODE}" != "all" ]; then
            modes="[\"${INPUT_TEST_MODE}\"]"
          else
            modes='["editmode","playmode"]'
          fi
          {
            echo "unity-versions=${versions}"
            echo "test-modes=${modes}"
          } >> "${GITHUB_OUTPUT}"

  unity-tests:
    name: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs: matrix-config
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected)
      }}
    runs-on:
      group: ambiguous-interactive-organization-builds
      labels:
        - self-hosted
        - Windows
        - RAM-64GB
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
        test-mode: ${{ fromJSON(needs.matrix-config.outputs.test-modes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        env:
          MANIFEST_HASH: ${{ hashFiles('.unity-test-project/Packages/manifest.json') }}
          LOCK_HASH: ${{ hashFiles('.unity-test-project/Packages/packages-lock.json') }}
          VERSION_HASH: ${{ hashFiles('.unity-test-project/ProjectSettings/ProjectVersion.txt') }}
        with:
          path: .unity-test-project/Library
          key: Library-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.MANIFEST_HASH }}-${{ env.LOCK_HASH }}-${{ env.VERSION_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Run Unity tests
        shell: pwsh
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_VERSION: ${{ matrix.unity-version }}
          CI: "true"
        run: |
          $results = ".artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}/results.xml"
          ./scripts/unity/run-tests.ps1 `
            -Platform "${{ matrix.test-mode }}" `
            -UnityVersion "${{ matrix.unity-version }}" `
            -Runner docker `
            -Results $results

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 14
