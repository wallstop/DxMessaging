name: Spellcheck

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.cs"
      - "**/*.json"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.ps1"
      - "**/*.js"
      - ".github/**"
      - ".llm/**"
      - ".cspell.json"
      - ".gitignore"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - "**/*.cs"
      - "**/*.json"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.ps1"
      - "**/*.js"
      - ".github/**"
      - ".llm/**"
      - ".cspell.json"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spellcheck:
    name: Check spelling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Run cspell
        # Keep the summary line on failures so CI logs show files-scanned vs. issues count.
        run: npx --yes cspell@10.0.0 --no-progress .
