name: Markdown Link Text Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - ".github/scripts/check_markdown_links.py"
      - ".github/scripts/check_markdown_url_encoding.py"
      - ".github/scripts/test_check_markdown_links.py"
      - ".github/scripts/test_check_markdown_url_encoding.py"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - ".github/scripts/check_markdown_links.py"
      - ".github/scripts/check_markdown_url_encoding.py"
      - ".github/scripts/test_check_markdown_links.py"
      - ".github/scripts/test_check_markdown_url_encoding.py"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdown link checker unit tests
        run: >-
          PYTHONPATH=.github/scripts
          python3 -m unittest discover -s .github/scripts -p "test_check_markdown_*.py"

      - name: Validate link text for markdown-to-markdown links
        run: python3 .github/scripts/check_markdown_links.py .

      - name: Verify relative links are URL-encoded
        run: python3 .github/scripts/check_markdown_url_encoding.py .
