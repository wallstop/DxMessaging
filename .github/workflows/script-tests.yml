name: Script Tests

on:
  pull_request:
    paths:
      - .github/workflows/script-tests.yml
      - .github/actions/**/action.yml
      - .github/workflows/unity-*.yml
      - Editor/Analyzers/**
      - Editor/SetupCscRsp.cs
      - package.json
      - Runtime/**/*.cs
      - SourceGenerators/**
      - Tests/**/*.asmdef
      - Tests/**/*.cs
      - scripts/**/*.ps1
      - scripts/**/*.sh
      - scripts/**/*.js
      - scripts/__tests__/**/*.js
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/script-tests.yml
      - .github/actions/**/action.yml
      - .github/workflows/unity-*.yml
      - Editor/Analyzers/**
      - Editor/SetupCscRsp.cs
      - package.json
      - Runtime/**/*.cs
      - SourceGenerators/**
      - Tests/**/*.asmdef
      - Tests/**/*.cs
      - scripts/**/*.ps1
      - scripts/**/*.sh
      - scripts/**/*.js
      - scripts/__tests__/**/*.js
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run script tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run Jest script tests
        run: npm run test:scripts

  preflight-pre-push:
    name: Run preflight:pre-push (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    # Phase 5 CI parity: run the full `npm run preflight:pre-push` chain on
    # the two developer OS runners GitHub Actions provides for this matrix
    # (Ubuntu + Windows). macOS parity is covered by the
    # pre-commit-tooling-check.yml workflow's preflight step, which runs the
    # same chain on macos-latest. The concurrency group is expanded with
    # ${{ matrix.os }} per scripts/validate-workflows.js: a matrix job may
    # not share a single concurrency slot across OS entries (one slot would
    # cancel every successive OS the moment the next OS queues).
    concurrency:
      group: ${{ github.workflow }}-preflight-pre-push-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Ensure pinned pre-commit
        run: node scripts/ensure-pre-commit.js

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run preflight:pre-push
        # `shell: bash` ensures the chained npm script + pre-commit
        # invocation resolves the same way on windows-latest (Git Bash) as
        # on ubuntu-latest, so a Windows-only quoting or path-shim
        # regression cannot pass CI unnoticed.
        # timeout-minutes: the heaviest step (full parity sweep + full Jest
        # suite). The job timeout (30) is generous, but a per-step timeout turns
        # a genuine wedge into a clear "step timed out" signal instead of an
        # opaque job-level cancel -- consistent with the other preflight jobs.
        timeout-minutes: 15
        shell: bash
        run: npm run preflight:pre-push
