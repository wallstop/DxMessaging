name: Script Tests

on:
  pull_request:
    paths:
      - .github/workflows/script-tests.yml
      - package.json
      - scripts/**/*.ps1
      - scripts/**/*.sh
      - scripts/**/*.js
      - scripts/__tests__/**/*.js
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/script-tests.yml
      - package.json
      - scripts/**/*.ps1
      - scripts/**/*.sh
      - scripts/**/*.js
      - scripts/__tests__/**/*.js
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run script tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run Jest script tests
        run: npm run test:scripts
