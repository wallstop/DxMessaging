name: Unity IL2CPP

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "43 9 * * 2"
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version. Empty = 2022.3.45f1."
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  matrix-config:
    name: Resolve IL2CPP matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
          else
            versions='["2022.3.45f1"]'
          fi
          echo "unity-versions=${versions}" >> "${GITHUB_OUTPUT}"

  runner-preflight:
    name: Self-hosted runner access preflight
    # See docs/runbooks/unity-runners-after-transfer.md for the design
    # contract. CRITICAL: this preflight must NEVER make Unity CI more
    # broken than the no-preflight baseline -- if both runner-inventory
    # endpoints return 403/404, soft-pass with a ::warning::.
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected)
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      # NOTE: `administration: read` is NOT a valid permissions key for
      # workflow GITHUB_TOKEN (per actionlint and the GitHub docs schema).
      # Listing self-hosted runners requires admin:org (org-scope) OR a
      # fine-grained PAT with repo "Administration: read" -- neither of
      # which the default GITHUB_TOKEN can carry. The soft-pass path in
      # the run script below is the supported coverage when the token
      # is unscoped. See docs/runbooks/unity-runners-after-transfer.md.
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB"
        # gh api --paginate | jq -s pattern mirrors stuck-job-watchdog.yml.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select(($labels | all(. as $l | (.labels // []) | map(.name) | index($l) | type == "number")))
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The Unity matrix would queue forever."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

  il2cpp-tests:
    name: IL2CPP ${{ matrix.unity-version }}
    needs:
      - matrix-config
      - runner-preflight
    # GATED OFF (if: false): this job is red-by-design today and must not run.
    # See the BEST-EFFORT comment block in the steps below for the full detail.
    # Two documented blockers keep it broken on Windows containers:
    #   1. TestRunnerBuilder.BuildIL2CPPTestPlayer
    #      (.unity-test-project/Assets/Editor/TestRunnerBuilder.cs:79) hardcodes
    #      BuildTarget.StandaloneLinux64, so it emits a Linux ELF a Windows
    #      container cannot execute -- even though we request StandaloneWindows64.
    #   2. Windows IL2CPP needs the VS C++ Build Tools, which are not present in
    #      stock game-ci Windows images (a custom image is required).
    # Because every Unity job shares the single-seat unity-pro-license
    # concurrency group, a red-by-design il2cpp job would also starve the working
    # editmode/playmode jobs of the license slot. The migrated build/run/parse
    # steps below are kept intact so re-enabling is a one-line `if:` flip once
    # TestRunnerBuilder.cs honors the requested target AND a custom game-ci
    # Windows image with VS Build Tools exists.
    if: ${{ false }}
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 120
    concurrency:
      group: unity-pro-license
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolved to the WSL stub at
        # C:\Windows\System32\bash.exe and failed with "Windows Subsystem
        # for Linux has no installed distributions." See FIX #4 sweep
        # report in the dev/wallstop/swap branch and validate-workflows.js
        # rule `forbidPlainShellBashOnSelfHostedWindows`.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "1 (within-workflow license serialization)"

      - name: Cache Unity Library
        uses: actions/cache@v4
        env:
          MANIFEST_HASH: ${{ hashFiles('.unity-test-project/Packages/manifest.json') }}
          LOCK_HASH: ${{ hashFiles('.unity-test-project/Packages/packages-lock.json') }}
          VERSION_HASH: ${{ hashFiles('.unity-test-project/ProjectSettings/ProjectVersion.txt') }}
        with:
          path: .unity-test-project/Library
          key: Library-il2cpp-${{ matrix.unity-version }}-${{ env.MANIFEST_HASH }}-${{ env.LOCK_HASH }}-${{ env.VERSION_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # =====================================================================
      # BEST-EFFORT / PENDING RUNNER VALIDATION -- READ BEFORE EDITING.
      # =====================================================================
      # IL2CPP standalone in a Windows container is fundamentally harder than
      # the editmode/playmode game-ci path:
      #
      #   1. IL2CPP for StandaloneWindows64 requires the Visual Studio C++
      #      Build Tools at build time. Microsoft does NOT permit redistributing
      #      VS Build Tools inside the stock game-ci Windows Unity images, so a
      #      CUSTOM image (game-ci base + VS Build Tools installed) is very
      #      likely required for this job to actually build a Windows player.
      #      Until that image is built and the self-hosted runner is validated,
      #      treat this job as best-effort.
      #
      #   2. CAVEAT (Unity internals): the build entry point
      #      WallstopStudios.DxMessaging.TestHarness.Editor.TestRunnerBuilder.
      #      BuildIL2CPPTestPlayer (in .unity-test-project/Assets/Editor/
      #      TestRunnerBuilder.cs) HARDCODES BuildTarget.StandaloneLinux64.
      #      DXM_IL2CPP_BUILD_PATH below only controls the OUTPUT FILE PATH/NAME,
      #      not the build target. So even though we request StandaloneWindows64
      #      on the unity-builder step and name the output Tests.exe, the .cs
      #      method as written will still produce a Linux ELF unless/until the
      #      builder is taught to honor the requested target (a Unity-internals
      #      change outside this CI migration's scope). A Windows container
      #      cannot execute a Linux ELF, so the "Run IL2CPP player" step will
      #      fail until TestRunnerBuilder.cs is updated. This is documented here
      #      rather than silently broken.
      # =====================================================================

      # Single source of truth for the assembly include list: the same
      # asmdef-discovery.js module the local run-tests scripts use. Extracted
      # into a composite action shared by all four Unity workflows; shell: pwsh
      # is enforced inside the composite. NOTE: -assemblyNames is a Unity Test
      # Runner argument consumed at PLAYER LAUNCH, not at build time -- the
      # filter is applied in the "Run IL2CPP player" step below.
      - name: Compute test assembly list
        uses: ./.github/actions/compute-unity-assemblies

      # Build the IL2CPP player with the maintained game-ci builder. Targets
      # StandaloneWindows64 (a Windows container CANNOT execute a Linux ELF).
      # runAsHostUser writes the build owned by the runner user. See the
      # BEST-EFFORT caveat above re: VS Build Tools + TestRunnerBuilder.cs.
      - name: Build IL2CPP test player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          # TestRunnerBuilder.BuildIL2CPPTestPlayer reads this env var to decide
          # where to write the player. A Windows path under github.workspace
          # ending in Tests.exe. (See caveat above: the .cs method as written
          # still picks the build TARGET itself; this only sets the output path.)
          DXM_IL2CPP_BUILD_PATH: ${{ github.workspace }}\builds\StandaloneWindows64\IL2CPPTests\Tests.exe
        with:
          projectPath: .unity-test-project
          unityVersion: ${{ matrix.unity-version }}
          targetPlatform: StandaloneWindows64
          buildMethod: WallstopStudios.DxMessaging.TestHarness.Editor.TestRunnerBuilder.BuildIL2CPPTestPlayer
          # -assemblyNames is consumed at player launch (below), not at build.
          customParameters: -nographics
          buildName: IL2CPPTests
          buildsPath: builds
          runAsHostUser: "true"

      # Launch the produced player and capture its exit code. The player runs
      # the embedded Unity Test Runner and writes NUnit XML. Capture $LASTEXITCODE
      # immediately -- a crash can leave failed=0/total>0 which the guard below
      # treats as a failure via the exit-code-first ordering.
      - name: Run IL2CPP player
        id: run-il2cpp
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $binary = "${{ github.workspace }}\builds\StandaloneWindows64\IL2CPPTests\Tests.exe"
          if (-not (Test-Path $binary)) {
            $alt = Get-ChildItem -Path . -Recurse -Filter Tests.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '[\\/](builds|Builds)[\\/]' } |
              Select-Object -First 1
            if ($alt) {
              $binary = $alt.FullName
            } else {
              Write-Host "::error::IL2CPP player binary (Tests.exe) not found under builds/ -- see the BEST-EFFORT caveat (Linux target / VS Build Tools)"
              Get-ChildItem -Path . -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match '[\\/](builds|Builds)[\\/]' } |
                Select-Object -ExpandProperty FullName
              exit 1
            }
          }
          Write-Host "Launching $binary"
          & $binary -batchmode -nographics -runTests `
            -testResults "artifacts/il2cpp-results.xml" `
            -assemblyNames "${{ env.DXM_TEST_ASSEMBLIES }}" `
            -logFile - 2>&1 | Tee-Object -FilePath "artifacts/il2cpp-log.txt"
          $status = $LASTEXITCODE
          "il2cpp-exit-code=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Player exited with status $status"

      # GUARD ORDER (mirrors the disabled reference): check the player exit code
      # FIRST (a crash can leave failed=0/total>0 yet the binary aborted), THEN
      # require total>0, THEN require failed==0. Native [xml] parsing keeps this
      # dependent only on PowerShell (no python3 on the Windows host).
      - name: Parse IL2CPP test results
        if: always()
        shell: pwsh
        env:
          IL2CPP_EXIT_CODE: ${{ steps.run-il2cpp.outputs.il2cpp-exit-code }}
        run: |
          $xml = "artifacts/il2cpp-results.xml"
          if (-not (Test-Path $xml)) {
            Write-Host "::error::IL2CPP results XML missing at $xml -- player did not produce results"
            exit 1
          }
          [xml]$doc = Get-Content -LiteralPath $xml
          $run = $doc.SelectSingleNode('//test-run')
          if (-not $run) {
            Write-Host "::error::No <test-run> element in $xml -- tests did not run"
            exit 1
          }
          $total = [int]($run.total)
          $passed = [int]($run.passed)
          $failed = [int]($run.failed)
          $skipped = [int]($run.skipped)
          Write-Host "Results: total=$total passed=$passed failed=$failed skipped=$skipped"
          # N3: check the player exit code FIRST. A crash after partial test
          # execution can leave failed=0/total>0 yet the binary aborted; we must
          # not let that look like a green run.
          $exitCode = $env:IL2CPP_EXIT_CODE
          if (-not [string]::IsNullOrEmpty($exitCode) -and $exitCode -ne "0") {
            Write-Host "::error::IL2CPP player exited with code $exitCode (possible crash)"
            exit [int]$exitCode
          }
          if ($total -lt 1) {
            Write-Host "::error::IL2CPP run produced 0 tests -- check the assembly list"
            exit 1
          }
          if ($failed -ne 0) {
            Write-Host "::error::IL2CPP run reported $failed failed test(s)"
            exit 1
          }
          Write-Host "::notice::IL2CPP ${{ matrix.unity-version }}: total=$total passed=$passed failed=$failed skipped=$skipped"

      - name: Upload IL2CPP artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: il2cpp-${{ matrix.unity-version }}
          path: |
            artifacts/il2cpp-results.xml
            artifacts/il2cpp-log.txt
          if-no-files-found: warn
          retention-days: 14
