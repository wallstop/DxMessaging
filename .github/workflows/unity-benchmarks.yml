name: Unity Benchmarks

on:
  schedule:
    - cron: "29 10 * * 3"
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version. Empty = full matrix."
        required: false
        default: ""
        type: string

# Top-level permissions are least-privilege and mirror unity-tests.yml. The
# licensed matrix jobs (matrix-config, runner-preflight, benchmarks) only need
# read access plus checks:write for NUnit annotations and issues:write for
# benchmark-failure notifications; they must NOT inherit write scope. The
# documented dispatch-throughput numbers are owned entirely by the Performance
# Numbers workflow (.github/workflows/perf-numbers.yml), which runs on every
# pull_request and commits the refreshed docs/architecture/performance.md back
# onto the PR branch; this scheduled workflow keeps the per-version benchmark
# test coverage and does not maintain the doc, so it needs no write scope.
permissions:
  contents: read
  checks: write
  issues: write

jobs:
  matrix-config:
    name: Resolve benchmark matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
      latest-version: ${{ steps.resolve.outputs.latest-version }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
        # The benchmark matrix mirrors the unity-tests.yml version list so the
        # scheduled perf coverage tracks every supported runtime. The LAST entry
        # is the latest Unity version (exposed as latest-version for reference;
        # the documented doc table is now maintained by the per-PR Performance
        # Numbers workflow, .github/workflows/perf-numbers.yml). A dispatch
        # override pins a single version.
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
            latest="${INPUT_UNITY_VERSION}"
          else
            versions='["2021.3.45f1","2022.3.45f1","6000.3.16f1"]'
            latest="6000.3.16f1"
          fi
          {
            echo "unity-versions=${versions}"
            echo "latest-version=${latest}"
          } >> "${GITHUB_OUTPUT}"

  runner-preflight:
    name: Self-hosted runner access preflight
    # See docs/runbooks/unity-runners-after-transfer.md for the design
    # contract. CRITICAL: this preflight must NEVER make Unity CI more
    # broken than the no-preflight baseline -- if both runner-inventory
    # endpoints return 403/404, soft-pass with a ::warning::.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      # NOTE: `administration: read` is NOT a valid permissions key for
      # workflow GITHUB_TOKEN (per actionlint and the GitHub docs schema).
      # Listing self-hosted runners requires admin:org (org-scope) OR a
      # fine-grained PAT with repo "Administration: read" -- neither of
      # which the default GITHUB_TOKEN can carry. The soft-pass path in
      # the run script below is the supported coverage when the token
      # is unscoped. See docs/runbooks/unity-runners-after-transfer.md.
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.RUNNER_AUDIT_PAT || secrets.GITHUB_TOKEN }}
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB"
        # gh api --paginate | jq -s pattern mirrors stuck-job-watchdog.yml.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select(($labels | all(. as $l | (.labels // []) | map(.name) | index($l) | type == "number")))
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The Unity matrix would queue forever."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

  benchmarks:
    name: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs:
      - matrix-config
      - runner-preflight
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 660
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
        test-mode:
          - editmode
          - playmode
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolved to the WSL stub at
        # C:\Windows\System32\bash.exe and failed with "Windows Subsystem
        # for Linux has no installed distributions." See FIX #4 sweep
        # report in the dev/wallstop/swap branch and validate-workflows.js
        # rule `forbidPlainShellBashOnSelfHostedWindows`.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "default (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        uses: actions/cache@v4
        env:
          PACKAGE_HASH: ${{ hashFiles('package.json', 'Runtime/**', 'Editor/**', 'Tests/**', 'scripts/unity/run-ci-tests.ps1') }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          key: Library-bench-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.PACKAGE_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list: the same
      # asmdef-discovery.js module the local run-tests scripts use. For
      # benchmarks we OPT IN to the perf assemblies (Benchmarks/Allocations)
      # via include-perf -- this mirrors the old runner's include-perf flag.
      # Extracted into a composite action shared by all three Unity workflows;
      # shell: pwsh is enforced inside the composite.
      - name: Compute benchmark assembly list
        uses: ./.github/actions/compute-unity-assemblies
        with:
          include-perf: "true"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Provision Unity Editor
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -ProvisioningProfile EditorOnly `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-benchmark-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 90

      - name: Acquire organization Unity lock
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      - name: Run Unity Test Runner
        timeout-minutes: 120
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}'

      - name: Return Unity license
        if: always()
        uses: ./.github/actions/return-unity-license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      # CANCELLATION + TIMEOUT DIAGNOSTIC: when Unity 2022 hangs in csc the
      # runner step times out (or the operator cancels), and the verify
      # step below (gated on `!cancelled()`) skips -- so its catastrophic-
      # pattern scan never fires either. This step covers both
      # failure() AND cancelled() so the operator has SOMETHING to look at
      # in the GitHub summary (the tail of unity.log + any catastrophic
      # patterns the partial log happened to surface). Best-effort: never
      # fails the job, no-ops when unity.log doesn't exist (cancellation
      # before Unity launched).
      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      # CLASS GUARD: Unity can fail before NUnit writes results. The shared
      # composite fails unless a results XML exists AND reports total > 0.
      # Skip on cancellation so a user-cancelled run does not emit the
      # generic "tests did not run" annotation -- the cancellation itself
      # is the explanation. The guard still runs on failure (to surface
      # "tests did not run" / catastrophic-compile diagnostics) and on
      # success (to confirm a real result XML exists).
      - name: Verify tests actually ran
        if: ${{ !cancelled() }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-benchmarks-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 90
