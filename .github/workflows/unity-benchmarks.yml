name: Unity Benchmarks

on:
  schedule:
    - cron: "29 10 * * 3"
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version. Empty = full matrix."
        required: false
        default: ""
        type: string

# MEDIUM-1: top-level permissions are least-privilege and mirror
# unity-tests.yml. The licensed matrix jobs (matrix-config, runner-preflight,
# benchmarks) only need read access plus checks:write for NUnit annotations and
# issues:write for benchmark-failure notifications; they must NOT inherit write
# scope. The docs PR writer (update-perf-doc) grants contents:write +
# pull-requests:write on the job itself, so that scope never leaks to the
# Unity-credential-using jobs.
permissions:
  contents: read
  checks: write
  issues: write

jobs:
  matrix-config:
    name: Resolve benchmark matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
      latest-version: ${{ steps.resolve.outputs.latest-version }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
        # The benchmark matrix mirrors the unity-tests.yml version list so the
        # documented perf numbers track every supported runtime. The LAST entry
        # is the latest Unity version; its run drives the auto-updated doc table
        # (see the update-perf-doc job). A dispatch override pins a single
        # version and makes that version the latest for the update.
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
            latest="${INPUT_UNITY_VERSION}"
          else
            versions='["2021.3.45f1","2022.3.45f1","6000.3.16f1"]'
            latest="6000.3.16f1"
          fi
          {
            echo "unity-versions=${versions}"
            echo "latest-version=${latest}"
          } >> "${GITHUB_OUTPUT}"

  runner-preflight:
    name: Self-hosted runner access preflight
    # See docs/runbooks/unity-runners-after-transfer.md for the design
    # contract. CRITICAL: this preflight must NEVER make Unity CI more
    # broken than the no-preflight baseline -- if both runner-inventory
    # endpoints return 403/404, soft-pass with a ::warning::.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      # NOTE: `administration: read` is NOT a valid permissions key for
      # workflow GITHUB_TOKEN (per actionlint and the GitHub docs schema).
      # Listing self-hosted runners requires admin:org (org-scope) OR a
      # fine-grained PAT with repo "Administration: read" -- neither of
      # which the default GITHUB_TOKEN can carry. The soft-pass path in
      # the run script below is the supported coverage when the token
      # is unscoped. See docs/runbooks/unity-runners-after-transfer.md.
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.RUNNER_AUDIT_PAT || secrets.GITHUB_TOKEN }}
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB"
        # gh api --paginate | jq -s pattern mirrors stuck-job-watchdog.yml.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select(($labels | all(. as $l | (.labels // []) | map(.name) | index($l) | type == "number")))
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The Unity matrix would queue forever."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

  benchmarks:
    name: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs:
      - matrix-config
      - runner-preflight
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 660
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
        test-mode:
          - editmode
          - playmode
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolved to the WSL stub at
        # C:\Windows\System32\bash.exe and failed with "Windows Subsystem
        # for Linux has no installed distributions." See FIX #4 sweep
        # report in the dev/wallstop/swap branch and validate-workflows.js
        # rule `forbidPlainShellBashOnSelfHostedWindows`.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "default (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        uses: actions/cache@v4
        env:
          PACKAGE_HASH: ${{ hashFiles('package.json', 'Runtime/**', 'Editor/**', 'Tests/**', 'scripts/unity/run-ci-tests.ps1') }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          key: Library-bench-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.PACKAGE_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list: the same
      # asmdef-discovery.js module the local run-tests scripts use. For
      # benchmarks we OPT IN to the perf assemblies (Benchmarks/Allocations)
      # via include-perf -- this mirrors the old runner's include-perf flag.
      # Extracted into a composite action shared by all three Unity workflows;
      # shell: pwsh is enforced inside the composite.
      - name: Compute benchmark assembly list
        uses: ./.github/actions/compute-unity-assemblies
        with:
          include-perf: "true"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Provision Unity Editor
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -ProvisioningProfile EditorOnly `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-benchmark-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 90

      - name: Acquire organization Unity lock
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      - name: Run Unity Test Runner
        timeout-minutes: 120
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}'

      - name: Return Unity license
        if: always()
        uses: ./.github/actions/return-unity-license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      # CANCELLATION + TIMEOUT DIAGNOSTIC: when Unity 2022 hangs in csc the
      # runner step times out (or the operator cancels), and the verify
      # step below (gated on `!cancelled()`) skips -- so its catastrophic-
      # pattern scan never fires either. This step covers both
      # failure() AND cancelled() so the operator has SOMETHING to look at
      # in the GitHub summary (the tail of unity.log + any catastrophic
      # patterns the partial log happened to surface). Best-effort: never
      # fails the job, no-ops when unity.log doesn't exist (cancellation
      # before Unity launched).
      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      # CLASS GUARD: Unity can fail before NUnit writes results. The shared
      # composite fails unless a results XML exists AND reports total > 0.
      # Skip on cancellation so a user-cancelled run does not emit the
      # generic "tests did not run" annotation -- the cancellation itself
      # is the explanation. The guard still runs on failure (to surface
      # "tests did not run" / catastrophic-compile diagnostics) and on
      # success (to confirm a real result XML exists).
      - name: Verify tests actually ran
        if: ${{ !cancelled() }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-benchmarks-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 90

      # MEDIUM-2: per-leg SUCCESS marker for the LATEST Unity version only.
      # `success()` here means every prior step in THIS matrix leg passed
      # (real result XML, verify guard green), and the matrix.unity-version
      # guard restricts the marker to the latest version's editmode/playmode
      # legs. update-perf-doc gates on BOTH markers (editmode + playmode) being
      # present, so a flaky OLDER version (2021/2022) can fail without blocking
      # the doc update -- the update tracks the latest version specifically, per
      # "from the latest Unity version." The artifact upload is gated by the
      # same condition so it only exists on a clean latest-version leg.
      - name: Mark latest-version benchmark success
        if: ${{ success() && matrix.unity-version == needs.matrix-config.outputs.latest-version }}
        # shell: pwsh (not bash): this step runs on the self-hosted Windows
        # runner, where `shell: bash` resolves to the WSL stub and fails. See
        # validate-workflows.js rule `forbidPlainShellBashOnSelfHostedWindows`.
        shell: pwsh
        run: |
          $markerDir = '.artifacts/perf-latest-ok'
          New-Item -ItemType Directory -Force -Path $markerDir | Out-Null
          $marker = Join-Path $markerDir '${{ matrix.test-mode }}.txt'
          @(
            "unity-version=${{ matrix.unity-version }}"
            "test-mode=${{ matrix.test-mode }}"
            "run-id=$env:GITHUB_RUN_ID"
          ) | Set-Content -Path $marker -Encoding utf8

      - name: Upload latest-version success marker
        if: ${{ success() && matrix.unity-version == needs.matrix-config.outputs.latest-version }}
        uses: actions/upload-artifact@v7
        with:
          name: perf-latest-ok-${{ matrix.test-mode }}
          path: .artifacts/perf-latest-ok/${{ matrix.test-mode }}.txt
          if-no-files-found: error
          retention-days: 90

  # AUTO-UPDATE the documented dispatch-throughput numbers from the LATEST
  # Unity version's benchmark run. This job needs no Unity, no license, and no
  # org lock -- it runs on ubuntu-latest, downloads the latest version's
  # benchmark artifacts (editmode + playmode logs/results), renders the
  # AUTOGENERATED table in docs/architecture/performance.md, normalizes it with
  # the repo's managed Prettier so the docs PR is GREEN on the REQUIRED
  # markdown-json.yml prettier gate, and opens/refreshes a docs PR when the
  # numbers move. A PR (not a direct push to protected master) keeps the docs
  # validators and human review in the loop; the render is deterministic and
  # idempotent within a tolerance so unchanged numbers (even across a changed
  # commit SHA) open no PR.
  #
  # MEDIUM-2 gating: this runs whenever the matrix was not cancelled/skipped --
  # NOT only when every leg is green -- and then proceeds only if BOTH
  # latest-version legs (editmode + playmode) emitted their success marker. A
  # flaky OLDER Unity version therefore does not block the latest-version doc
  # update.
  update-perf-doc:
    name: Auto-update perf doc from latest Unity
    needs:
      - matrix-config
      - benchmarks
    if: ${{ !cancelled() && needs.benchmarks.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # MEDIUM-1: write scope is granted ONLY here (the docs PR writer), not at
    # the workflow top level, so the licensed Unity jobs never inherit it.
    permissions:
      contents: write
      pull-requests: write
    env:
      LATEST_VERSION: ${{ needs.matrix-config.outputs.latest-version }}
      PERF_DOC: docs/architecture/performance.md
      PERF_BRANCH: auto/perf-doc-update
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        # render-perf-doc.js is dependency-free, but the managed Prettier
        # normalization below resolves prettier from node_modules.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Download latest-version success markers
        # Present only when a latest-version leg fully passed (see the
        # "Mark latest-version benchmark success" step). A pattern that matches
        # nothing downloads nothing rather than failing.
        uses: actions/download-artifact@v7
        with:
          pattern: perf-latest-ok-*
          path: .artifacts/perf-latest-ok
          merge-multiple: true

      - name: Gate on latest-version benchmark success
        id: gate
        # MEDIUM-2: proceed only when BOTH editmode and playmode markers exist
        # for the latest version. Older-version failures cannot reach this step
        # (they never write a marker), so they cannot block the update.
        run: |
          set -euo pipefail
          editmode=".artifacts/perf-latest-ok/editmode.txt"
          playmode=".artifacts/perf-latest-ok/playmode.txt"
          if [ -f "${editmode}" ] && [ -f "${playmode}" ]; then
            echo "Both latest-version (${LATEST_VERSION}) benchmark legs succeeded."
            echo "proceed=true" >> "${GITHUB_OUTPUT}"
          else
            edit_state="missing"; [ -f "${editmode}" ] && edit_state="present"
            play_state="missing"; [ -f "${playmode}" ] && play_state="present"
            echo "::notice::Latest-version (${LATEST_VERSION}) benchmark did not"
            echo "::notice::produce both success markers; skipping perf-doc update"
            echo "::notice::(editmode marker: ${edit_state}, playmode marker: ${play_state})."
            echo "proceed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download latest-version benchmark artifacts
        if: steps.gate.outputs.proceed == 'true'
        # No merge-multiple: editmode and playmode each ship their own
        # unity.log + results.xml, so each artifact must land in its own
        # subdirectory to avoid same-name collisions. The find below recurses
        # through every subdirectory and feeds all of them to the extractor.
        uses: actions/download-artifact@v7
        with:
          pattern: unity-benchmarks-${{ env.LATEST_VERSION }}-*
          path: .artifacts/perf-download

      - name: Render dispatch-throughput table from latest run
        id: render
        if: steps.gate.outputs.proceed == 'true'
        # extract-perf-baseline.js / render-perf-doc.js read both the structured
        # Debug.Log lines (unity.log) and the NUnit TestContext.Out CSV rows
        # (results.xml). Filter to the latest Unity version via the platform
        # substring the benchmark encodes ("...; Unity <version>"). The render is
        # a no-op when the committed table already matches within tolerance.
        #
        # CRITICAL-1: after rendering we run the repo's managed Prettier
        # (--write) over the doc and compute "changed" from `git diff` AFTER
        # that, so whatever lands on the PR branch is byte-identical to what the
        # REQUIRED markdown-json.yml `format:md:check` gate expects. The
        # renderer already emits Prettier-aligned tables, so this is a verified
        # no-op on the table itself and only guards the rest of the file.
        run: |
          set -euo pipefail
          inputs=()
          while IFS= read -r -d '' file; do
            inputs+=(--input "${file}")
          done < <(find .artifacts/perf-download \
            -type f \( -name 'unity.log' -o -name 'results.xml' \) -print0)
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::error::No unity.log/results.xml found for ${LATEST_VERSION}."
            exit 1
          fi
          node scripts/unity/render-perf-doc.js \
            "${inputs[@]}" \
            --doc "${PERF_DOC}" \
            --unity-version "${LATEST_VERSION}"
          node scripts/run-managed-prettier.js --write "${PERF_DOC}"
          if git diff --quiet -- "${PERF_DOC}"; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify rendered doc passes the required prettier gate
        if: steps.gate.outputs.proceed == 'true' && steps.render.outputs.changed == 'true'
        # Belt-and-suspenders: fail loudly here rather than open a PR that is
        # red on markdown-json.yml. This is the exact check that gate runs.
        run: node scripts/run-managed-prettier.js --check "${PERF_DOC}"

      - name: Commit perf-doc update to the bot branch
        id: commit
        if: steps.gate.outputs.proceed == 'true' && steps.render.outputs.changed == 'true'
        # HIGH-1: the maintained git-auto-commit-action commits on the current
        # HEAD (master) and pushes HEAD:auto/perf-doc-update with --force, so it
        # recreates the bot-owned throwaway branch from scratch every run. There
        # is no force-with-lease "stale info" failure on the 2nd+ run, and the
        # branch is not protected so no PAT is needed. Matches the repo's
        # action-pinning convention (@v7, as in update-llms-txt.yml).
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.PERF_BRANCH }}
          push_options: "--force"
          file_pattern: docs/architecture/performance.md
          commit_message: |
            docs(perf): auto-update dispatch throughput numbers

            From Unity ${{ env.LATEST_VERSION }} benchmark run ${{ github.run_id }}.
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Open docs pull request when numbers moved
        if: ${{ steps.gate.outputs.proceed == 'true' && steps.commit.outputs.changes_detected == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The bot branch is stable, so reruns update the same PR instead of
        # stacking new ones; only create a PR when none is open.
        run: |
          set -euo pipefail
          existing="$(gh pr list --head "${PERF_BRANCH}" --state open \
            --json number --jq 'length')"
          if [ "${existing}" = "0" ]; then
            body_file="$(mktemp)"
            {
              echo "Auto-generated from the latest Unity"
              echo "(${LATEST_VERSION}) benchmark run."
              echo
              echo "The AUTOGENERATED region in"
              echo "docs/architecture/performance.md is owned by"
              echo "scripts/unity/render-perf-doc.js; review the"
              echo "numbers and merge."
            } > "${body_file}"
            gh pr create \
              --head "${PERF_BRANCH}" \
              --base "${GITHUB_REF_NAME}" \
              --title "docs(perf): auto-update dispatch throughput numbers" \
              --body-file "${body_file}"
          fi
