name: Docs Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.cs"
      - "scripts/validate-docs-ascii.js"
      - "scripts/validate-doc-code-patterns.js"
      - "scripts/validate-docs-prose.js"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - "**/*.cs"
      - "scripts/validate-docs-ascii.js"
      - "scripts/validate-doc-code-patterns.js"
      - "scripts/validate-docs-prose.js"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-docs-ascii:
    name: Validate docs are ASCII-only
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Run validate-docs-ascii
        run: node scripts/validate-docs-ascii.js

  validate-doc-code-patterns:
    name: Validate doc code samples
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Run validate-doc-code-patterns
        run: node scripts/validate-doc-code-patterns.js

  validate-docs-prose:
    name: Validate human-prose policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Run validate-docs-prose
        run: node scripts/validate-docs-prose.js
