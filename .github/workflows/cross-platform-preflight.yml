name: Cross-platform preflight

# Catches Windows-only regressions in the managed-Jest / integrity-gate /
# resolver-probe code paths that motivated the path-separator and resolver-
# health hardening. Runs the same preflight the developer runs locally
# (npm run preflight:pre-push) on every supported OS so a path-separator
# regression in a test or a resolver-binding failure cannot reach master
# unobserved. See .llm/skills/scripting/integrity-gate-robustness.md for the
# class-of-failure context.

on:
  pull_request:
    paths:
      - "package.json"
      - ".pre-commit-config.yaml"
      - "scripts/**"
      - ".llm/**"
      - ".github/workflows/cross-platform-preflight.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - ".pre-commit-config.yaml"
      - "scripts/**"
      - ".llm/**"
      - ".github/workflows/cross-platform-preflight.yml"
  workflow_dispatch:

concurrency:
  group: cross-platform-preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # fetch-depth: 0 is REQUIRED because `npm run preflight:pre-push`
          # transitively invokes `validate:changelog:coverage`, which runs
          # `git diff origin/<base>...HEAD`. A shallow clone has no
          # origin/<base> ref, the diff fails, and validate-changelog.js
          # raises E006. See script-tests.yml and pre-commit-tooling-check.yml
          # which already set this. The same requirement is enforced by
          # findChangelogCoverageCheckoutViolations() in validate-workflows.js.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Install pre-commit hook environments
        run: pre-commit install-hooks

      - name: Run cross-platform spawn + host-env hermeticity regression suite
        # Targeted Jest run: these are the tests that regression-proof the
        # classes of failures fixed in this branch -- path-separator /
        # resolver-health PLUS npm/npx spawn-shape divergence and Unity
        # ensure-editor host-env hermeticity. Keeping them as a first,
        # dedicated step makes a CI failure immediately point at the right
        # skill (integrity-gate-robustness) without hunting through a long
        # combined log. The membership of this list is kept honest by
        # scripts/__tests__/cross-platform-preflight-coverage.test.js: every
        # test carrying the @cross-platform-regression marker must appear here.
        shell: bash
        run: |
          set -euo pipefail
          node scripts/run-managed-jest.js --runTestsByPath \
            scripts/__tests__/path-classifier.test.js \
            scripts/__tests__/cross-platform-path-handling.test.js \
            scripts/__tests__/node-modules-integrity.test.js \
            scripts/__tests__/run-managed-jest.test.js \
            scripts/__tests__/spawn-invocation-policy.test.js \
            scripts/__tests__/shell-command.test.js \
            scripts/lib/__tests__/spawn-env-sandbox.test.js \
            scripts/__tests__/hermetic-host-env-policy.test.js \
            scripts/__tests__/unity-ensure-editor-il2cpp-idempotency.test.js

      - name: Run pre-push preflight
        shell: bash
        run: npm run preflight:pre-push
