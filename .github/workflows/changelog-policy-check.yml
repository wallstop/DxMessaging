name: Changelog Policy Check

on:
  pull_request:
    paths:
      - "CHANGELOG.md"
      - "package.json"
      - "Runtime/**"
      - "Editor/**"
      - "!Editor/Analyzers/**"
      - "!Editor/Testing/**"
      - "SourceGenerators/**"
      - "Samples~/**"
      - "scripts/validate-changelog.js"
      - "scripts/validate-pre-commit-tooling.js"
      - "scripts/__tests__/validate-changelog.test.js"
      - "scripts/__tests__/validate-pre-commit-tooling.test.js"
      - ".pre-commit-config.yaml"
      - ".llm/context.md"
      - ".llm/skills/documentation/changelog-*.md"
      - ".github/workflows/changelog-policy-check.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "CHANGELOG.md"
      - "package.json"
      - "Runtime/**"
      - "Editor/**"
      - "!Editor/Analyzers/**"
      - "!Editor/Testing/**"
      - "SourceGenerators/**"
      - "Samples~/**"
      - "scripts/validate-changelog.js"
      - "scripts/validate-pre-commit-tooling.js"
      - "scripts/__tests__/validate-changelog.test.js"
      - "scripts/__tests__/validate-pre-commit-tooling.test.js"
      - ".pre-commit-config.yaml"
      - ".llm/context.md"
      - ".llm/skills/documentation/changelog-*.md"
      - ".github/workflows/changelog-policy-check.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog-policy:
    name: Validate changelog policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run changelog validator tests
        run: >-
          node scripts/run-managed-jest.js --runTestsByPath
          scripts/__tests__/validate-changelog.test.js

      - name: Validate changelog policy with coverage checks
        run: node scripts/validate-changelog.js --check-coverage
