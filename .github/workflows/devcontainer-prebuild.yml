# =============================================================================
# Devcontainer Pre-build (GHCR Cache Warm)
# =============================================================================
# Purpose:
#   Pre-builds the .devcontainer image and pushes it to GHCR so:
#     1. CI workflows that consume the same image (devcontainer-test.yml)
#        get fast cache hits.
#     2. New contributors hitting "Open in Container" / "Open in Codespace"
#        don't pay a 5-15 minute cold build the first time.
#     3. Weekly rebuilds catch base-image security updates and CVE drift.
#
# Triggers:
#   - Pushes to master that touch .devcontainer/** (image needs rebuild).
#   - Weekly cron (Sunday 00:00 UTC) — keep the cache warm + capture base
#     image updates even when no code changes.
#   - Manual dispatch.
#
# Critical: explicit push before verification
#   devcontainers/ci@v0.3 performs registry pushes from its post action. A
#   follow-up step that tries to pull the image from GHCR runs before that post
#   action, so it observes the previous registry state instead of the image that
#   was just built. This workflow builds with push disabled, pushes explicitly,
#   and only then verifies the remote manifest.
#
# Permissions:
#   `packages: write` is required for the docker/login-action push to GHCR
#   under the GITHUB_TOKEN.
# =============================================================================

name: Pre-build Devcontainer

on:
  push:
    branches:
      - master
    paths:
      - ".devcontainer/**"
  schedule:
    # Sunday 00:00 UTC — weekly rebuild keeps the image fresh and captures
    # base-image updates / CVE patches.
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prebuild:
    name: Build + push devcontainer image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Debug workflow context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"

      - name: Set lowercase repository name
        id: repo
        run: |
          set -euo pipefail
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository_lowercase=${repo_lower}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push devcontainer image
        uses: devcontainers/ci@v0.3
        env:
          BUILDKIT_PROGRESS: plain
        with:
          imageName: ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer
          cacheFrom: ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer
          # Push explicitly in the next step. devcontainers/ci's action-managed
          # push runs as a post action, which is too late for same-job registry
          # verification.
          push: never

      - name: Push devcontainer image to GHCR
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer:latest"

          echo "=== Local Docker images before push ==="
          docker images --digests | grep devcontainer || echo "No local devcontainer images found"
          echo ""

          echo "=== Inspecting local image ==="
          docker image inspect "${IMAGE}" --format 'id={{.Id}} created={{.Created}} size={{.Size}}'
          echo ""

          echo "=== Pushing ${IMAGE} ==="
          docker push "${IMAGE}"
          echo ""

          echo "=== Remote manifest after push ==="
          manifest_file="$(mktemp)"
          docker manifest inspect "${IMAGE}" > "${manifest_file}"
          sed -n '1,80p' "${manifest_file}"

      - name: Verify image pushed to GHCR
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer:latest"
          echo "=== Local Docker images ==="
          docker images | grep devcontainer || echo "No local devcontainer images found"
          echo ""
          echo "=== Checking local image ==="
          if docker image inspect "${IMAGE}" >/dev/null 2>&1; then
            echo "Image found locally"
            docker image inspect "${IMAGE}" --format '{{.Id}} {{.Created}}'
          else
            echo "WARNING: Image not found locally"
          fi
          echo ""
          echo "=== Pulling from GHCR to verify push ==="
          if docker pull "${IMAGE}"; then
            echo "Image successfully pulled from GHCR."
          else
            echo "ERROR: failed to pull image from GHCR after explicit push." >&2
            echo "Diagnostics:" >&2
            echo "  image=${IMAGE}" >&2
            echo "  event=${{ github.event_name }}" >&2
            echo "  ref=${{ github.ref }}" >&2
            echo "  actor=${{ github.actor }}" >&2
            docker manifest inspect "${IMAGE}" >&2 || true
            exit 1
          fi
