name: YAML Format + Lint

on:
  pull_request:
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/**"
      - ".yamllint.yaml"
      - ".prettierrc*"
      - "package.json"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/**"
      - ".yamllint.yaml"
      - ".prettierrc*"
      - "package.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-checks:
    name: Prettier and yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Prettier check (YAML)
        run: npm run format:yaml:check

      - name: YAML line-length auto-fixer check (comments + block scalars)
        run: |
          # Node check-mode of the auto-fixers gates CI so hand-edits or drift
          # around the fixers fail here, not at the last-resort yamllint hook.
          # Comments auto-wrap via `npm run format:yaml:comments`; long pwsh
          # run block-scalar strings auto-rewrite via `npm run format:yaml:lines`.
          npm run check:yaml:comments
          npm run check:yaml:lines

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: .
          config_file: .yamllint.yaml
          strict: true
