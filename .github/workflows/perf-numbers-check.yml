name: Performance Numbers Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - "Runtime/Core/MessageBus/MessageBus.cs"
      - "Runtime/Core/MessageHandler.cs"
      - "Runtime/Core/Pooling/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  perf-numbers:
    name: Validate performance numbers
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate PR performance section
        uses: actions/github-script@v9
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            if (!pullRequest) {
              core.info("No pull request payload found; skipping.");
              return;
            }

            const body = pullRequest.body ?? "";
            const heading = /^### Performance numbers\s*$/gim;
            const match = heading.exec(body);
            if (!match) {
              core.setFailed(
                "Hot-path PRs must include a ### Performance numbers section."
              );
              return;
            }

            const rest = body.slice(match.index + match[0].length);
            const nextHeading = rest.search(/^#{1,3}\s+/m);
            const rawSection =
              nextHeading === -1 ? rest : rest.slice(0, nextHeading);
            const section = rawSection
              .replace(/<!--[\s\S]*?-->/g, "")
              .trim();

            if (!section) {
              core.setFailed(
                "The ### Performance numbers section must contain before/after numbers or an accepted N/A line."
              );
              return;
            }

            const lines = section
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean);
            const acceptedRefactor = /^N\/A - refactor only\s+\S.+$/i;
            const acceptedNonHotPath =
              /^N\/A - non-hot-path edit only\s+\S.+$/i;
            // The dispatch-throughput numbers are now auto-maintained: the
            // Unity Benchmarks workflow renders them into the AUTOGENERATED
            // region of docs/architecture/performance.md from the latest Unity
            // run and opens a docs PR when they move. A hot-path PR author may
            // therefore defer the before/after table to that automation with a
            // one-line reference instead of hand-capturing numbers.
            // LOW-2: require the reference to actually point at the auto-update
            // (the rendered doc or the workflow) rather than being bare free
            // text, so the escape stays auditable.
            const acceptedAutoMaintained =
              /^N\/A - auto-maintained\s+\S.*\b(?:performance\.md|unity-benchmarks)\b.*$/i;

            if (
              lines.length === 1 &&
              (acceptedRefactor.test(lines[0]) ||
                acceptedNonHotPath.test(lines[0]) ||
                acceptedAutoMaintained.test(lines[0]))
            ) {
              core.info("Performance numbers section uses an accepted N/A form.");
              return;
            }

            if (lines.some((line) => /^N\/A\b/i.test(line))) {
              core.setFailed(
                "N/A performance sections must use one accepted one-line form: " +
                  "N/A - refactor only <justification>, " +
                  "N/A - non-hot-path edit only <description>, or " +
                  "N/A - auto-maintained <reference to the CI perf auto-update; " +
                  "the reference must mention performance.md or unity-benchmarks>."
              );
              return;
            }

            const expectedHeaders = [
              "scenario",
              "baseline run",
              "this pr",
              "delta",
            ];

            function splitMarkdownRow(line) {
              if (!line.includes("|")) {
                return null;
              }

              const trimmed = line
                .replace(/^\|/, "")
                .replace(/\|$/, "");

              return trimmed
                .split("|")
                .map((cell) => cell.trim());
            }

            function normalizeHeader(cell) {
              return cell.toLowerCase().replace(/\s+/g, " ").trim();
            }

            function isSeparatorRow(cells) {
              return (
                cells.length === expectedHeaders.length &&
                cells.every((cell) => /^:?-{3,}:?$/.test(cell))
              );
            }

            function isPlaceholderCell(cell) {
              const normalized = cell
                .replace(/`/g, "")
                .replace(/\s+/g, " ")
                .trim()
                .toLowerCase();
              return (
                normalized === "" ||
                normalized === "-" ||
                normalized === "n/a" ||
                normalized === "todo" ||
                normalized === "tbd" ||
                normalized.includes("todo") ||
                normalized.includes("to be measured") ||
                /(^|\s)[+-]?[xyz](?:\.[xyz]+)?(?:\s|$|%)/i.test(normalized)
              );
            }

            const rows = lines.map(splitMarkdownRow);
            if (rows.some((row) => row === null)) {
              core.setFailed(
                "Performance numbers must be either one accepted N/A line or a markdown table."
              );
              return;
            }

            const header = rows[0].map(normalizeHeader);
            const separator = rows.length > 1 ? rows[1] : [];
            const hasExpectedHeader =
              header.length === expectedHeaders.length &&
              expectedHeaders.every((expected, index) => header[index] === expected);

            if (
              !hasExpectedHeader ||
              !isSeparatorRow(separator) ||
              rows.length < 3
            ) {
              core.setFailed(
                "Performance numbers tables must use columns: " +
                  "| Scenario | Baseline run | This PR | Delta |, " +
                  "plus at least one data row."
              );
              return;
            }

            const dataRows = rows.slice(2).filter(
              (row) =>
                row.length === expectedHeaders.length &&
                row.every((cell) => !isPlaceholderCell(cell))
            );
            if (dataRows.length === 0) {
              core.setFailed(
                "Performance numbers tables must contain at least one non-placeholder data row."
              );
              return;
            }

            core.info("Performance numbers section contains a populated table.");
