name: Fast LLM Policy Checks

on:
  pull_request:
    paths:
      - ".llm/**"
      - "scripts/validate-skills.js"
      - "scripts/generate-skills-index.js"
      - ".github/workflows/llm-policy-check.yml"
  push:
    branches:
      - main
      - master
    paths:
      - ".llm/**"
      - "scripts/validate-skills.js"
      - "scripts/generate-skills-index.js"
      - ".github/workflows/llm-policy-check.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  llm-policy-checks:
    name: LLM policy and index freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Validate .llm markdown policy
        run: node scripts/validate-skills.js

      - name: Verify skills index is up to date
        run: node scripts/generate-skills-index.js --check
