name: Performance Numbers

# CI owns the documented dispatch-throughput numbers end to end. On every
# pull_request change to master/main this workflow re-runs the editmode +
# playmode dispatch benchmarks on ELI-MACHINE (the `fast` runner) at the LATEST
# Unity version, renders the AUTOGENERATED region of
# docs/architecture/performance.md from that run, and commits the refreshed doc
# directly back onto the PR head branch. The numbers are therefore owned by CI,
# not by committed state, manual runs, or PR-body text.
on:
  pull_request:
    branches:
      - master
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Top-level least-privilege. Only the doc-commit job (commit-perf-doc) needs
# contents:write to push the rendered doc onto the PR head branch; it grants
# that scope on the job itself so the licensed Unity job never inherits write.
permissions:
  contents: read
  checks: write

jobs:
  runner-preflight:
    name: Self-hosted runner access preflight
    # Mirrors unity-tests.yml's preflight. Runs on ubuntu-latest BEFORE the
    # self-hosted perf-benchmarks job tries to queue, converting a missing
    # ELI-MACHINE from a "queued forever" hang into a fast, explained failure.
    # CRITICAL CONTRACT: this preflight must NEVER make perf CI more broken than
    # the no-preflight baseline. If the token cannot list either the org-level
    # OR repo-level runner inventory (403/404 from both), it emits a
    # ::warning:: and exits 0 (soft pass). Only a provably-wrong inventory
    # fails hard. See docs/runbooks/unity-runners-after-transfer.md.
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.RUNNER_AUDIT_PAT || secrets.GITHUB_TOKEN }}
          # The `fast` label pins this workflow to ELI-MACHINE specifically (the
          # only self-hosted Windows runner carrying `fast`). A missing
          # ELI-MACHINE therefore fails this preflight fast. Keep in sync with
          # the perf-benchmarks `runs-on:` below.
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB,fast"
        # gh api --paginate | jq -s pattern mirrors unity-tests.yml /
        # stuck-job-watchdog.yml; see those files for why `jq -s` is required.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select(($labels | all(. as $l | (.labels // []) | map(.name) | index($l) | type == "number")))
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The perf benchmark job would queue forever."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

  loop-guard:
    name: Resolve perf-autoupdate loop guard
    # LOOP-GUARD: the commit-perf-doc job pushes a perf-doc commit back to the PR
    # head branch, which fires the `synchronize` event again. Without a guard
    # that would re-trigger the expensive Unity benchmark run on every bot
    # commit, looping forever. The bot commit carries a `[perf-autoupdate]`
    # sentinel in its message; this cheap ubuntu job reads the PR head commit
    # message and, when the sentinel is present, sets should-run=false so the
    # downstream Unity run + commit are SKIPPED. We deliberately do NOT use
    # `[skip ci]` for the bot commit: that would skip required status checks on
    # the final (numbers-fresh) commit and could block merge.
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      should-run: ${{ steps.guard.outputs.should-run }}
    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v6
        with:
          # Check out the PR head ref (the branch the numbers commit lands on)
          # so the head commit message is the one we inspect. On
          # workflow_dispatch head.sha is empty and checkout falls back to the
          # default ref, which is fine (dispatch never carries the sentinel).
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Detect perf-autoupdate sentinel on the head commit
        id: guard
        env:
          # The sentinel the bot commit carries. Kept in an env var so the
          # comparison is a literal-string check, never an expression-injection
          # surface. Keep in sync with commit-perf-doc's commit_message below
          # and the unity-workflow-shape contract test.
          PERF_AUTOUPDATE_SENTINEL: "[perf-autoupdate]"
        run: |
          set -euo pipefail
          message="$(git log -1 --pretty=%B)"
          echo "Head commit subject: $(git log -1 --pretty=%s)"
          if printf '%s' "${message}" | grep -qF -- "${PERF_AUTOUPDATE_SENTINEL}"; then
            echo "Head commit carries ${PERF_AUTOUPDATE_SENTINEL}; skipping the"
            echo "expensive Unity benchmark run + perf-doc commit to break the"
            echo "synchronize loop."
            echo "should-run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Head commit does not carry the perf-autoupdate sentinel; the"
            echo "Unity benchmark run + perf-doc commit will proceed."
            echo "should-run=true" >> "${GITHUB_OUTPUT}"
          fi

  perf-benchmarks:
    name: Perf benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs:
      - runner-preflight
      - loop-guard
    # Same-repo gate (forks cannot run licensed Unity or be pushed to) AND the
    # loop guard (skip when the head commit is a bot perf-autoupdate commit).
    # Mirrors unity-tests.yml's same-repo expression.
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        needs.loop-guard.outputs.should-run == 'true'
      }}
    # Pinned to ELI-MACHINE via the `fast` label (the only self-hosted Windows
    # runner carrying it). Keep in sync with the preflight REQUIRED_LABELS.
    runs-on: [self-hosted, Windows, RAM-64GB, fast]
    timeout-minutes: 660
    strategy:
      fail-fast: false
      # Both legs share the one Unity activation seat behind the org lock; run
      # them one-at-a-time within this workflow run so they queue behind one
      # another instead of racing the lock.
      max-parallel: 1
      matrix:
        # LATEST Unity version only -- the documented numbers track the newest
        # supported runtime. Single-entry matrix (not a bare scalar) so the leg
        # name still carries the version.
        unity-version:
          - "6000.3.16f1"
        # render-perf-doc.js consumes BOTH editmode and playmode legs.
        test-mode:
          - editmode
          - playmode
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Check out the PR head so the benchmark runs against the PR's code,
          # not the merge commit. On workflow_dispatch this is empty and falls
          # back to the default ref.
          ref: ${{ github.event.pull_request.head.sha }}
          lfs: true

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolves to the WSL stub and fails. See
        # validate-workflows.js rule `forbidPlainShellBashOnSelfHostedWindows`.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "perf (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        uses: actions/cache@v4
        env:
          PACKAGE_HASH: ${{ hashFiles('package.json', 'Runtime/**', 'Editor/**', 'Tests/**', 'scripts/unity/run-ci-tests.ps1') }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          key: Library-perf-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.PACKAGE_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list. Perf benchmarks
      # OPT IN to the Benchmarks/Allocations assemblies via include-perf, exactly
      # as unity-benchmarks.yml does.
      - name: Compute benchmark assembly list
        uses: ./.github/actions/compute-unity-assemblies
        with:
          include-perf: "true"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Editor install/repair does NOT require the paid Unity seat, so it runs
      # BEFORE the org lock. EditorOnly: editmode/playmode benchmarks do not need
      # a player toolchain.
      - name: Provision Unity Editor
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -ProvisioningProfile EditorOnly `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      - name: Run Unity Test Runner
        timeout-minutes: 120
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}'

      - name: Return Unity license
        if: always()
        uses: ./.github/actions/return-unity-license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Perf ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      - name: Verify tests actually ran
        if: ${{ !cancelled() }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Perf ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      - name: Upload perf benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 14

  commit-perf-doc:
    name: Commit refreshed perf doc to the PR branch
    needs:
      - loop-guard
      - perf-benchmarks
    # Only commit on pull_request events (a workflow_dispatch has no PR head
    # branch to push onto), only for same-repo PRs (a fork branch cannot be
    # pushed to with GITHUB_TOKEN), only when the loop guard allowed the run,
    # and only when BOTH benchmark legs actually succeeded (the rendered doc
    # must reflect a clean editmode + playmode run, not a partial one).
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        needs.loop-guard.outputs.should-run == 'true' &&
        needs.perf-benchmarks.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents:write is granted ONLY here so the licensed perf-benchmarks job
    # never inherits push scope.
    permissions:
      contents: write
    env:
      LATEST_VERSION: "6000.3.16f1"
      PERF_DOC: docs/architecture/performance.md
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v6
        with:
          # Check out the PR head BRANCH (ref, not sha) with persist-credentials
          # so the rendered-doc commit can be pushed back onto it. For same-repo
          # PRs the default GITHUB_TOKEN can push to the branch.
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        # render-perf-doc.js is dependency-free, but the managed Prettier
        # normalization below resolves prettier from node_modules.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Download perf benchmark artifacts
        # editmode and playmode each ship their own unity.log + results.xml, so
        # each artifact must land in its own subdirectory to avoid same-name
        # collisions. The render step recurses through every subdirectory.
        uses: actions/download-artifact@v7
        with:
          pattern: perf-${{ env.LATEST_VERSION }}-*
          path: .artifacts/perf-download

      - name: Render dispatch-throughput table from this run
        id: render
        # render-perf-doc.js reads both the structured Debug.Log lines
        # (unity.log) and the NUnit TestContext.Out CSV rows (results.xml) for
        # the latest Unity version. After rendering we run the repo's managed
        # Prettier (--write) over the doc and compute "changed" from `git diff`
        # AFTER that, so whatever lands on the PR branch is byte-identical to
        # what the REQUIRED markdown-json.yml prettier gate expects. The render
        # is a no-op when the committed table already matches within tolerance.
        run: |
          set -euo pipefail
          inputs=()
          while IFS= read -r -d '' file; do
            inputs+=(--input "${file}")
          done < <(find .artifacts/perf-download \
            -type f \( -name 'unity.log' -o -name 'results.xml' \) -print0)
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::error::No unity.log/results.xml found for ${LATEST_VERSION}."
            exit 1
          fi
          node scripts/unity/render-perf-doc.js \
            "${inputs[@]}" \
            --doc "${PERF_DOC}" \
            --unity-version "${LATEST_VERSION}"
          node scripts/run-managed-prettier.js --write "${PERF_DOC}"
          if git diff --quiet -- "${PERF_DOC}"; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify rendered doc passes the required prettier gate
        if: steps.render.outputs.changed == 'true'
        # Belt-and-suspenders: fail loudly here rather than push a commit that is
        # red on markdown-json.yml. This is the exact check that gate runs.
        run: node scripts/run-managed-prettier.js --check "${PERF_DOC}"

      - name: Commit refreshed perf doc onto the PR head branch
        if: steps.render.outputs.changed == 'true'
        # Commits the rendered doc and pushes it onto the PR head branch (the
        # branch checked out above). The commit_message carries the literal
        # [perf-autoupdate] sentinel (kept in lockstep with the loop-guard job's
        # PERF_AUTOUPDATE_SENTINEL env) so the loop-guard job skips the next
        # synchronize-triggered run and the loop terminates. NOT [skip ci]: the
        # required checks must still run on this final, numbers-fresh commit.
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          file_pattern: docs/architecture/performance.md
          commit_message: |
            docs(perf): auto-update dispatch throughput numbers [perf-autoupdate]

            From Unity ${{ env.LATEST_VERSION }} benchmark run ${{ github.run_id }}.
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
