name: Release Drafter

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-drafter
  cancel-in-progress: false

jobs:
  update-release-draft:
    if: github.repository == 'Ambiguous-Interactive/DxMessaging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Diagnose release inputs
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(jq -r '.version // empty' package.json)"
          LATEST_TAG="$(git tag --list | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$' | sort -V | tail -n 1 || true)"
          if [ -n "$LATEST_TAG" ]; then
            COMMITS_SINCE_TAG="$(git rev-list "${LATEST_TAG}..HEAD" --count)"
          else
            COMMITS_SINCE_TAG="$(git rev-list HEAD --count)"
          fi
          echo "Package version: ${PACKAGE_VERSION:-missing}"
          echo "Latest semver tag: ${LATEST_TAG:-none}"
          echo "Commits since latest tag: ${COMMITS_SINCE_TAG}"
          echo "Draft changelog source: CHANGELOG.md ## [Unreleased]"

      - name: Extract unreleased changelog
        id: changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "Warning: CHANGELOG.md not found"
            echo "No changelog file found." > /tmp/changelog_section.md
            echo "changelog_file=/tmp/changelog_section.md" >> "$GITHUB_OUTPUT"
            echo "changelog_section=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGELOG_CONTENT=$(awk -v ver="Unreleased" '
            BEGIN { found=0; content="" }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) {
                found=1
                next
              }
            }
            found { content = content $0 "\n" }
            END { print content }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_CONTENT" ] || [ "$CHANGELOG_CONTENT" = $'\n' ]; then
            CHANGELOG_CONTENT="No changelog entry found under Unreleased."
          fi

          echo "$CHANGELOG_CONTENT" > /tmp/changelog_section.md
          echo "changelog_file=/tmp/changelog_section.md" >> "$GITHUB_OUTPUT"
          echo "changelog_section=Unreleased" >> "$GITHUB_OUTPUT"
          echo "Extracted Unreleased changelog bytes: $(wc -c < /tmp/changelog_section.md)"

      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v7
        id: release_drafter
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release body with changelog
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ steps.release_drafter.outputs.id }}
          DRAFTER_BODY: ${{ steps.release_drafter.outputs.body }}
          CHANGELOG_FILE: ${{ steps.changelog.outputs.changelog_file }}
          CHANGELOG_SECTION: ${{ steps.changelog.outputs.changelog_section }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const releaseId = parseInt(process.env.RELEASE_ID, 10);
            if (!Number.isInteger(releaseId) || releaseId <= 0) {
              throw new Error('Invalid releaseId: ' + process.env.RELEASE_ID + '. Expected a positive integer.');
            }
            const drafterBody = process.env.DRAFTER_BODY || '';
            const changelogFile = process.env.CHANGELOG_FILE;
            const changelogSection = process.env.CHANGELOG_SECTION || 'unknown';

            let changelogContent = '';
            try {
              changelogContent = fs.readFileSync(changelogFile, 'utf8').trim();
            } catch (err) {
              console.log('Warning: Could not read changelog file:', err.message);
              changelogContent = 'No changelog content available.';
            }

            const bodyParts = [
              '## Changelog',
              '',
              changelogContent,
              '',
              '---',
              '',
              drafterBody
            ];
            const body = bodyParts.join('\n');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: body
            });

            console.log('Updated release draft body for release id ' + releaseId + ' using changelog section ' + changelogSection + '.');
