name: NPM Package Validation

on:
  pull_request:
    paths:
      - "**/*.meta"
      - "Editor/**"
      - "Runtime/**"
      - "Samples~/**"
      - "SourceGenerators/**"
      - "*.md"
      - "*.md.meta"
      - "package.json"
      - ".npmignore"
      - "scripts/validate-npm-meta.js"
      - "scripts/__tests__/validate-npm-meta.test.js"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.meta"
      - "Editor/**"
      - "Runtime/**"
      - "Samples~/**"
      - "SourceGenerators/**"
      - "*.md"
      - "*.md.meta"
      - "package.json"
      - ".npmignore"
      - "scripts/validate-npm-meta.js"
      - "scripts/__tests__/validate-npm-meta.test.js"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-npm-meta:
    name: Validate NPM Meta Files (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        # This job uses POSIX shell conditionals in run blocks; keep shell
        # explicit so windows-latest does not default to PowerShell.
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Diagnose shell and lockfile policy
        run: |
          set -euo pipefail
          echo "Runner OS: ${{ runner.os }}"
          echo "Bash version: ${BASH_VERSION:-unknown}"
          if [ -f package-lock.json ]; then
            echo "Lockfile status: package-lock.json present (install mode: npm ci)"
          else
            echo "Lockfile status: package-lock.json absent (install mode: npm i --no-audit --no-fund)"
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            echo "Install mode: npm ci"
            npm ci
          else
            echo "Install mode: npm i --no-audit --no-fund"
            npm i --no-audit --no-fund
          fi

      - name: Validate NPM package meta files
        run: npm run validate:npm-meta
