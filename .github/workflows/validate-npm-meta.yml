# cspell:words lscache
name: NPM Package Validation

on:
  pull_request:
    paths:
      - "**/*.meta"
      - "Editor/**"
      - "Runtime/**"
      - "Samples~/**"
      - "SourceGenerators/**"
      - "*.md"
      - "*.md.meta"
      - "package.json"
      - ".npmignore"
      - "scripts/validate-npm-meta.js"
      - "scripts/__tests__/validate-npm-meta.test.js"
      - ".github/workflows/validate-npm-meta.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.meta"
      - "Editor/**"
      - "Runtime/**"
      - "Samples~/**"
      - "SourceGenerators/**"
      - "*.md"
      - "*.md.meta"
      - "package.json"
      - ".npmignore"
      - "scripts/validate-npm-meta.js"
      - "scripts/__tests__/validate-npm-meta.test.js"
      - ".github/workflows/validate-npm-meta.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-npm-meta:
    name: Validate NPM Meta Files (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        # This job uses POSIX shell conditionals in run blocks; keep shell
        # explicit so windows-latest does not default to PowerShell.
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Diagnose shell and lockfile policy
        run: |
          set -euo pipefail
          echo "Runner OS: ${{ runner.os }}"
          echo "Bash version: ${BASH_VERSION:-unknown}"
          if [ -f package-lock.json ]; then
            echo "Lockfile status: package-lock.json present (install mode: npm ci)"
          else
            echo "Lockfile status: package-lock.json absent (install mode: npm i --no-audit --no-fund)"
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            echo "Install mode: npm ci"
            npm ci
          else
            echo "Install mode: npm i --no-audit --no-fund"
            npm i --no-audit --no-fund
          fi

      - name: Validate NPM package meta files
        run: npm run validate:npm-meta

      - name: "Inspect real npm pack tarball for issue #204 regressions"
        # Defense-in-depth check that runs `npm pack` (not --dry-run) and inspects the
        # produced tarball for any build artifact paths. The dry-run validator above
        # already enforces this, but a real pack on each runner OS catches platform
        # drift (e.g. case sensitivity, path separators, glob expansion differences).
        # See https://github.com/Ambiguous-Interactive/DxMessaging/issues/204 for the original
        # GuidDB::CreateMetaFileMappings regression that motivated this guard.
        #
        # IMPORTANT: keep the grep alternation below in sync with `buildArtifactPatterns`
        # in scripts/validate-npm-meta.js. Order matters -- list the most specific
        # patterns first (`.csproj.user`, `.DotSettings.user`) before the generic
        # `.user$` so any drift surfaces with the most actionable label.
        run: |
          set -euo pipefail
          npm pack
          tarball="$(find . -maxdepth 1 -type f -name '*.tgz' -print | sort | head -n1)"
          echo "Inspecting tarball: ${tarball}"
          leaks="$(tar -tzf "${tarball}" | grep -E '(^|/)(bin|obj)/|\.pdb$|\.tmp$|\.csproj\.user$|(^|/)\.vs/|(^|/)\.idea/|\.suo$|\.DotSettings\.user$|\.lscache(\.meta)?$|\.user$' || true)"
          if [ -n "${leaks}" ]; then
            echo "::error::npm pack tarball contains forbidden build artifact paths (issue 204 regression):"
            echo "${leaks}"
            rm -f -- *.tgz
            exit 1
          fi
          echo "OK: no bin/obj/pdb/tmp/IDE state in tarball."
          rm -f -- *.tgz
