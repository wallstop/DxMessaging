# =============================================================================
# Unity EditMode + PlayMode Tests (Disabled in GitHub)
# =============================================================================
# Purpose:
#   Disabled in GitHub Actions for now. Keep using the local runner:
#     bash scripts/unity/run-tests.sh --platform editmode
#     bash scripts/unity/run-tests.sh --platform playmode
#
# Disabled workflow contract:
#   The jobs are guarded with `if: ${{ false }}` so manual dispatch cannot run
#   game-ci while these tests are kept local-only.
#
# When re-enabled as a PR gate:
#   ADD a license backstop. These game-ci jobs activate a serial seat but have
#   NO if:always() ./.github/actions/return-unity-license step (disabled
#   workflows are exempt from the leak-safety guard). Before re-enabling, add
#   that step after the game-ci run and before the lock release, with
#   UNITY_EMAIL/UNITY_PASSWORD env -- otherwise a failed run leaks the seat.
#   The default assembly include list explicitly EXCLUDES the perf,
#   allocation, and comparison suites — those run on a separate scheduled
#   workflow (.github/workflows-disabled/unity-benchmarks.yml). DI-integration suites
#   (VContainer / Zenject / Reflex) are also opt-in and excluded here per
#   Phase 2 review fix M3.
#
# How the assembly list stays correct over time:
#   The `Compute test assembly list` step shells out to
#   scripts/unity/lib/asmdef-discovery.js, the SAME module used by
#   scripts/unity/run-tests.sh and the Phase 4 contract test. When a new perf
#   asmdef is added under Tests/, the regex in asmdef-discovery.js (matching
#   Benchmarks|Allocations|Comparisons) classifies it automatically and this
#   workflow needs no edits. Likewise, new core asmdefs are picked up
#   automatically.
#
# Required repository secrets (set in repo Settings -> Secrets and variables):
#   UNITY_SERIAL / UNITY_EMAIL / UNITY_PASSWORD — classic serial activation
#                            credentials (Unity Pro/Plus seat). This is the
#                            single CI activation path now that the repo moved
#                            off the floating-license server.
#   See .llm/skills/unity/unity-license-bootstrap.md for setup.
#
# Common failure modes & remediation:
#   1. "License activation failed" — the most common new-contributor failure.
#      One of UNITY_SERIAL / UNITY_EMAIL / UNITY_PASSWORD is missing or wrong.
#      Re-bootstrap via unity-license-bootstrap.md and re-set the secrets.
#   2. "Test framework not found" — usually means the .unity-test-project
#      Library cache is corrupted. Bump the cache key prefix below to bust it,
#      or push a no-op commit to .unity-test-project/Packages/manifest.json
#      to invalidate the hashFiles() component of the key.
#   3. "0 tests ran" — the assembly include list resolved to a name that no
#      asmdef advertises. Run `node scripts/unity/lib/asmdef-discovery.js`
#      locally to diff the discovered names against the previous run.
#
# Manual override when re-enabled:
#   Use the workflow_dispatch inputs to pin a single Unity version or a single
#   test mode (handy when triaging a regression on one channel).
# =============================================================================

name: Unity Tests

on:
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version (e.g. 2022.3.45f1). Empty = full matrix."
        required: false
        default: ""
        type: string
      test-mode:
        description: "Pin a single test mode (use 'all' for both)."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - editmode
          - playmode

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  matrix-config:
    name: Resolve test matrix
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
      test-modes: ${{ steps.resolve.outputs.test-modes }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
          INPUT_TEST_MODE: ${{ inputs.test-mode }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
          else
            versions='["2021.3.45f1","2022.3.45f1","6000.3.16f1"]'
          fi
          if [ -n "${INPUT_TEST_MODE:-}" ] && [ "${INPUT_TEST_MODE}" != "all" ]; then
            modes="[\"${INPUT_TEST_MODE}\"]"
          else
            modes='["editmode","playmode"]'
          fi
          {
            echo "unity-versions=${versions}"
            echo "test-modes=${modes}"
          } >> "${GITHUB_OUTPUT}"

  unity-tests:
    name: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs: matrix-config
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
        test-mode: ${{ fromJSON(needs.matrix-config.outputs.test-modes) }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      # M4: include manifest, lock, and ProjectVersion in the hash. Variables
      # are defined here so the long hashFiles() expressions don't violate the
      # repo's 200-char yamllint cap (and stay readable).
      - name: Cache Unity Library
        uses: actions/cache@v4
        env:
          MANIFEST_HASH: ${{ hashFiles('.unity-test-project/Packages/manifest.json') }}
          LOCK_HASH: ${{ hashFiles('.unity-test-project/Packages/packages-lock.json') }}
          VERSION_HASH: ${{ hashFiles('.unity-test-project/ProjectSettings/ProjectVersion.txt') }}
        with:
          path: .unity-test-project/Library
          key: Library-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.MANIFEST_HASH }}-${{ env.LOCK_HASH }}-${{ env.VERSION_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Compute test assembly list
        run: |
          set -euo pipefail
          assemblies=$(node -e "const m=require('./scripts/unity/lib/asmdef-discovery.js'); console.log(m.defaultIncludeAssemblies(process.cwd()).join(';'))")
          if [ -z "${assemblies}" ]; then
            echo "::error::asmdef discovery returned an empty assembly list" >&2
            exit 1
          fi
          echo "DXM_TEST_ASSEMBLIES=${assemblies}" >> "${GITHUB_ENV}"
          echo "Resolved assemblies: ${assemblies}"

      - name: Run Unity Test Runner
        # game-ci reads UNITY_SERIAL/UNITY_EMAIL/UNITY_PASSWORD from env for
        # classic serial activation (the unityLicensingServer input is retired
        # now that this repo moved off the floating-license server).
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: .unity-test-project
          unityVersion: ${{ matrix.unity-version }}
          testMode: ${{ matrix.test-mode }}
          customParameters: -nographics -assemblyNames "${{ env.DXM_TEST_ASSEMBLIES }}"
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport"
          artifactsPath: artifacts/unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          checkName: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          # M3: include the CodeCoverage/ tree alongside the artifactsPath.
          # game-ci writes coverage HTML to CodeCoverage/ at the project root
          # by default (independent of artifactsPath), so we must enumerate
          # both paths here or the HTML report is dropped.
          path: |
            artifacts/unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}
            CodeCoverage/
          if-no-files-found: warn
          retention-days: 14
