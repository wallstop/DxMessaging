# =============================================================================
# Unity Performance Benchmarks (DISABLED IN GITHUB ACTIONS)
# =============================================================================
# Purpose:
#   Disabled in GitHub Actions for now. Keep using the local runner:
#     bash scripts/unity/run-tests.sh --platform playmode --include-perf
#
#   GitHub jobs are guarded with `if: ${{ false }}` so manual dispatch cannot
#   run game-ci while these tests are kept local-only.
#
#   When re-enabled, this runs the perf / allocation test suites that are
#   EXCLUDED from the PR gate (.github/workflows-disabled/unity-tests.yml). External
#   library comparison suites stay opt-in until the harness manifest installs
#   their packages. These are graded regression-watchers, not pass/fail PR gates.
#
# This workflow MUST NOT block PRs.
#   - No `pull_request` trigger.
#   - No `push` trigger to master (or any branch).
#   - The only trigger while disabled is `workflow_dispatch`, and the jobs skip.
#   This is an explicit hard requirement from the project lead; verify
#   compliance via:
#     test ! -e .github/workflows/unity-benchmarks.yml
#
# Assembly include list:
#   Computed dynamically with `includePerf: true` on the same
#   asmdef-discovery.js module used by the PR gate. No string lists in YAML;
#   adding a new benchmark asmdef under Tests/ is automatically picked up.
#   DI-integration suites remain excluded (their packages are not in the test
#   project's manifest.json).
#
# Results:
#   Uploaded as a workflow artifact (`unity-benchmarks-*`) with 90-day
#   retention so longitudinal comparison is possible. If the repo variable
#   `PERF_TRACKING_ISSUE_NUMBER` is set, a comment is posted on that issue
#   linking back to the workflow run; otherwise the comment step is skipped
#   silently.
#
# Required secrets:
#   UNITY_SERIAL / UNITY_EMAIL / UNITY_PASSWORD — classic serial activation
#                            credentials (Unity Pro/Plus seat). This is the
#                            single CI activation path now that the repo moved
#                            off the floating-license server.
#   See .llm/skills/unity/unity-license-bootstrap.md for setup.
# =============================================================================

name: Unity Benchmarks

on:
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version (default 2022.3.45f1)."
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  matrix-config:
    name: Resolve benchmark matrix
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
          else
            versions='["2022.3.45f1"]'
          fi
          echo "unity-versions=${versions}" >> "${GITHUB_OUTPUT}"

  benchmarks:
    name: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs: matrix-config
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
        test-mode: [editmode, playmode]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      # M4: include manifest, lock, and ProjectVersion in the hash. Variables
      # are defined here so the long hashFiles() expressions don't violate the
      # repo's 200-char yamllint cap (and stay readable).
      - name: Cache Unity Library
        uses: actions/cache@v4
        env:
          MANIFEST_HASH: ${{ hashFiles('.unity-test-project/Packages/manifest.json') }}
          LOCK_HASH: ${{ hashFiles('.unity-test-project/Packages/packages-lock.json') }}
          VERSION_HASH: ${{ hashFiles('.unity-test-project/ProjectSettings/ProjectVersion.txt') }}
        with:
          path: .unity-test-project/Library
          key: Library-bench-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.MANIFEST_HASH }}-${{ env.LOCK_HASH }}-${{ env.VERSION_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Compute benchmark assembly list
        run: |
          set -euo pipefail
          assemblies=$(node -e "const m=require('./scripts/unity/lib/asmdef-discovery.js'); console.log(m.defaultIncludeAssemblies(process.cwd(), { includePerf: true }).join(';'))")
          if [ -z "${assemblies}" ]; then
            echo "::error::asmdef discovery returned an empty benchmark assembly list" >&2
            exit 1
          fi
          echo "DXM_BENCH_ASSEMBLIES=${assemblies}" >> "${GITHUB_ENV}"
          echo "Resolved benchmark assemblies: ${assemblies}"

      - name: Run Unity Benchmarks
        # game-ci reads UNITY_SERIAL/UNITY_EMAIL/UNITY_PASSWORD from env for
        # classic serial activation (the unityLicensingServer input is retired
        # now that this repo moved off the floating-license server).
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: .unity-test-project
          unityVersion: ${{ matrix.unity-version }}
          testMode: ${{ matrix.test-mode }}
          customParameters: -nographics -assemblyNames "${{ env.DXM_BENCH_ASSEMBLIES }}"
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport"
          artifactsPath: artifacts/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          checkName: Benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-benchmarks-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          # M3: include the CodeCoverage/ tree alongside the artifactsPath.
          # game-ci writes coverage HTML to CodeCoverage/ at the project root
          # by default (independent of artifactsPath), so we must enumerate
          # both paths here or the HTML report is dropped.
          path: |
            artifacts/benchmarks/${{ matrix.unity-version }}-${{ matrix.test-mode }}
            CodeCoverage/
          if-no-files-found: warn
          retention-days: 90

      - name: Post tracking issue comment
        if: success() && vars.PERF_TRACKING_ISSUE_NUMBER != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ vars.PERF_TRACKING_ISSUE_NUMBER }}
          body: |
            Benchmark run completed for `${{ matrix.unity-version }}` `${{ matrix.test-mode }}`.

            - Workflow: `${{ github.workflow }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Commit: `${{ github.sha }}`
            - Trigger: `${{ github.event_name }}`

            Artifact: `unity-benchmarks-${{ matrix.unity-version }}-${{ matrix.test-mode }}` (retained 90 days).
