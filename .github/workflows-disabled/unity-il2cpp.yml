# =============================================================================
# Unity IL2CPP Standalone Player Tests (Disabled in GitHub)
# =============================================================================
# Purpose:
#   Disabled in GitHub Actions for now. Keep using the local runner:
#     bash scripts/unity/run-tests.sh --platform standalone
#
#   GitHub jobs are guarded with `if: ${{ false }}` so manual dispatch cannot
#   run game-ci while these tests are kept local-only.
#
#   When re-enabled, this builds the StandaloneLinux64 IL2CPP test player via
#   game-ci/unity-builder and runs the produced binary headlessly. IL2CPP
#   exercises the AOT-compiled path that EditMode/PlayMode under Mono cannot:
#     - Code stripping issues (linker.xml gaps, [Preserve] missing on reflected
#       types, generic-method instantiations stripped at link time)
#     - AOT generic-virtual-method (GVM) failures specific to IL2CPP
#     - PInvoke / native-callable signature mismatches
#     - C# language-feature regressions only the IL2CPP backend rejects
#   These regressions have historically slipped past the Mono-based EditMode
#   gate (.github/workflows-disabled/unity-tests.yml) and only surfaced when a
#   downstream consumer built a player.
#
# Schedule when re-enabled:
#   Use PR / push against a single Unity version for the gate, plus a weekly
#   cron for multi-version drift checks.
#
# Local debugging:
#   Reproduce a build failure end-to-end with the local runner script:
#     bash scripts/unity/run-tests.sh --platform standalone
#   The script uses the same TestRunnerBuilder.BuildIL2CPPTestPlayer entry
#   point and the same assembly include list as this workflow; if it passes
#   locally and fails here, the divergence is environmental (Library cache,
#   license, runner image) rather than test logic.
#
# Required secrets:
#   For Unity Personal: UNITY_LICENSE (raw .ulf contents) + UNITY_EMAIL + UNITY_PASSWORD
#   For Unity Professional serial: UNITY_SERIAL + UNITY_EMAIL + UNITY_PASSWORD
#   See .llm/skills/unity/unity-license-bootstrap.md for setup.
#   2FA on the Unity account MUST be disabled, or use a dedicated CI account.
# =============================================================================

name: Unity IL2CPP

on:
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version (default 2022.3.45f1)."
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  matrix-config:
    name: Resolve IL2CPP matrix
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
    steps:
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
          else
            versions='["2022.3.45f1"]'
          fi
          echo "unity-versions=${versions}" >> "${GITHUB_OUTPUT}"

  il2cpp-tests:
    name: IL2CPP ${{ matrix.unity-version }}
    needs: matrix-config
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.matrix-config.outputs.unity-versions) }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      # M4: include manifest, lock, and ProjectVersion in the hash. Variables
      # are defined here so the long hashFiles() expressions don't violate the
      # repo's 200-char yamllint cap (and stay readable).
      - name: Cache Unity Library
        uses: actions/cache@v4
        env:
          MANIFEST_HASH: ${{ hashFiles('.unity-test-project/Packages/manifest.json') }}
          LOCK_HASH: ${{ hashFiles('.unity-test-project/Packages/packages-lock.json') }}
          VERSION_HASH: ${{ hashFiles('.unity-test-project/ProjectSettings/ProjectVersion.txt') }}
        with:
          path: .unity-test-project/Library
          key: Library-il2cpp-${{ matrix.unity-version }}-${{ env.MANIFEST_HASH }}-${{ env.LOCK_HASH }}-${{ env.VERSION_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Compute test assembly list
        run: |
          set -euo pipefail
          assemblies=$(node -e "const m=require('./scripts/unity/lib/asmdef-discovery.js'); console.log(m.defaultIncludeAssemblies(process.cwd()).join(';'))")
          if [ -z "${assemblies}" ]; then
            echo "::error::asmdef discovery returned an empty assembly list" >&2
            exit 1
          fi
          echo "DXM_TEST_ASSEMBLIES=${assemblies}" >> "${GITHUB_ENV}"
          echo "Resolved assemblies: ${assemblies}"

      - name: Build IL2CPP test player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          # TestRunnerBuilder.BuildIL2CPPTestPlayer reads this env var to
          # decide where to write the player. We pin it to the path the run
          # step looks at below so the workflow doesn't depend on the local
          # default in the .cs source.
          DXM_IL2CPP_BUILD_PATH: ${{ github.workspace }}/builds/StandaloneLinux64/IL2CPPTests/Tests.x86_64
        with:
          projectPath: .unity-test-project
          unityVersion: ${{ matrix.unity-version }}
          targetPlatform: StandaloneLinux64
          buildMethod: WallstopStudios.DxMessaging.TestHarness.Editor.TestRunnerBuilder.BuildIL2CPPTestPlayer
          # NOTE: -assemblyNames is a Unity Test Runner argument consumed at
          # PLAYER LAUNCH, not at build time. Passing it here is a no-op; the
          # actual filter is applied in the run step below.
          customParameters: -nographics
          buildName: IL2CPPTests
          buildsPath: builds

      - name: Run IL2CPP test player
        id: run-il2cpp
        run: |
          set -uo pipefail
          mkdir -p artifacts
          binary="builds/StandaloneLinux64/IL2CPPTests/Tests.x86_64"
          if [ ! -x "${binary}" ]; then
            # Fallback: search for the produced binary if the layout differs
            # (e.g. older game-ci images use a "Builds/" capitalization).
            alt=$(find . -type f \( -name 'Tests.x86_64' -o -name 'Tests' \) \
                \( -path '*/builds/*' -o -path '*/Builds/*' \) \
                -perm -u+x 2>/dev/null | head -n1)
            if [ -n "${alt}" ] && [ -x "${alt}" ]; then
              binary="${alt}"
            else
              echo "::error::IL2CPP player binary not found under builds/ or Builds/" >&2
              find . -maxdepth 5 -type f \( -path '*/builds/*' -o -path '*/Builds/*' \) >&2 || true
              exit 1
            fi
          fi
          echo "Launching ${binary}"
          set +e
          "${binary}" \
            -batchmode \
            -nographics \
            -runTests \
            -testResults artifacts/il2cpp-results.xml \
            -assemblyNames "${DXM_TEST_ASSEMBLIES}" \
            -logFile - 2>&1 | tee artifacts/il2cpp-log.txt
          status=${PIPESTATUS[0]}
          set -e
          echo "il2cpp-exit-code=${status}" >> "${GITHUB_OUTPUT}"
          echo "Player exited with status ${status}"

      - name: Parse IL2CPP test results
        env:
          IL2CPP_EXIT_CODE: ${{ steps.run-il2cpp.outputs.il2cpp-exit-code }}
        run: |
          set -euo pipefail
          xml="artifacts/il2cpp-results.xml"
          if [ ! -f "${xml}" ]; then
            echo "::error::IL2CPP results XML missing at ${xml}" >&2
            exit 1
          fi
          summary=$(python3 scripts/unity/lib/parse-test-results.py "${xml}")
          echo "Summary: ${summary}"
          if [[ "${summary}" == PARSE_ERROR:* ]]; then
            echo "::error::Failed to parse IL2CPP results XML: ${summary#PARSE_ERROR:}" >&2
            exit 1
          fi
          # parse-test-results.py emits "OK total=.. passed=.. failed=.. skipped=.."
          total=$(echo "${summary}" | sed -n 's/.*total=\([0-9]*\).*/\1/p')
          failed=$(echo "${summary}" | sed -n 's/.*failed=\([0-9]*\).*/\1/p')
          # N3: check the player exit code FIRST. A crash after partial test
          # execution can leave failed=0/total>0 yet the binary aborted; we
          # must not let that look like a green run.
          if [ -n "${IL2CPP_EXIT_CODE:-}" ] && [ "${IL2CPP_EXIT_CODE}" != "0" ]; then
            echo "::error::IL2CPP player exited with code ${IL2CPP_EXIT_CODE} (possible crash)" >&2
            exit "${IL2CPP_EXIT_CODE}"
          fi
          if [ -z "${total}" ] || [ "${total}" = "0" ]; then
            echo "::error::IL2CPP run produced 0 tests — check assembly list" >&2
            exit 1
          fi
          if [ -n "${failed}" ] && [ "${failed}" != "0" ]; then
            echo "::error::IL2CPP run reported ${failed} failed test(s)" >&2
            exit 1
          fi
          echo "IL2CPP run OK (${summary})."

      - name: Upload IL2CPP artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: il2cpp-${{ matrix.unity-version }}
          path: |
            artifacts/il2cpp-results.xml
            artifacts/il2cpp-log.txt
          if-no-files-found: warn
          retention-days: 14
