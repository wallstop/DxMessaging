verbose = "info"
no_progress = true
max_concurrency = 4
include_mail = false

# Network tuning
timeout = 20            # seconds per request
max_retries = 3         # retry transient failures
retry_wait_time = 2     # seconds between retries
max_redirects = 10
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

# Treat successes, rate-limiting, and transient server errors as acceptable in CI
# Accept all 2xx as valid plus 429 (rate limited) and 502 (bad gateway - transient)
accept = ["200..=299", 429, 502]

# Only check web links
scheme = ["https", "http"]

# Ignore endpoints that block automated clients (local hosts, CF challenges)
exclude = [
  "^https?://localhost",
  "^http://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^file://",
  # NPM package page serves a Cloudflare JS challenge to non-browser clients; registry endpoint remains covered.
  "^https://www\\.npmjs\\.com/package/com\\.wallstop-studios\\.dxmessaging$",
  # GitHub Pages site - not deployed yet, will be available after first successful deploy
  "^https://wallstop\\.github\\.io/DxMessaging",
  # Self-repo blob (file) and tree (directory) links are validated offline against the working tree by
  # scripts/validate-docs-out-of-tree-links.js (avoids 404s for files added in the same PR before they reach master).
  "^https://github\\.com/Ambiguous-Interactive/DxMessaging/(?:blob|tree)/",
  # Game Programming Patterns site returns 415 (Unsupported Media Type) to automated clients despite valid content
  "^https://gameprogrammingpatterns\\.com/",
  # Unity Support (Zendesk + Cloudflare) returns 403 to non-browser clients regardless of User-Agent;
  # links are user-facing documentation and stay valid in real browsers.
  "^https?://support\\.unity\\.com/"
]
