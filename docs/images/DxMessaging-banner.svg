<!-- cspell:words labelledby describedby -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" role="img"
     aria-labelledby="dxmsgBannerTitle" aria-describedby="dxmsgBannerDesc">
  <title id="dxmsgBannerTitle">DxMessaging: Unity messaging library</title>
  <desc id="dxmsgBannerDesc">Unity messaging library for sending typed messages between game objects with zero-allocation dispatch.</desc>
  <defs>
    <!-- Messaging-themed gradients (blue/teal for communication) -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0"/>
      <stop offset="16%" style="stop-color:#3498db"/>
      <stop offset="52%" style="stop-color:#00d9ff"/>
      <stop offset="84%" style="stop-color:#2eccff"/>
      <stop offset="100%" style="stop-color:#2eccff;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="48%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#9bf3ff"/>
    </linearGradient>

    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#00d9ff"/>
    </linearGradient>

    <!-- Glow effect for the title -->
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow for the hex and version badge -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background: ensures consistent contrast in both light and dark README modes -->
  <rect x="0" y="0" width="800" height="200" fill="#0d1117"/>

  <!-- Wallstop Studios Hexagonal Logo (left side) -->
  <g transform="translate(50, 100)" filter="url(#softShadow)">
    <!-- Outer hexagon outline -->
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"
             fill="none" stroke="url(#hexGradient)" stroke-width="2.5" opacity="0.95"/>
    <!-- Inner hexagon tint -->
    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16"
             fill="url(#hexGradient)" opacity="0.24"/>
    <!-- Single clean letterform W (path-rendered for font independence) -->
    <path d="M-15,-12 L-9,12 L0,-3 L9,12 L15,-12"
          fill="none" stroke="url(#hexGradient)" stroke-width="3.5"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Main Title: DxMessaging -->
  <text x="120" y="75"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="52" font-weight="700" fill="url(#titleGradient)"
        filter="url(#titleGlow)" letter-spacing="1"
        paint-order="stroke" stroke="#000000" stroke-width="2" stroke-opacity="0.28" stroke-linejoin="round">DxMessaging</text>

  <!-- Tagline -->
  <text x="120" y="110"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" fill="#b8e0f0" letter-spacing="0.4"
        paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.65" stroke-linejoin="round">Synchronous messaging. Zero allocations. Lifecycle managed.</text>

  <!-- Blue-to-cyan divider -->
  <line x1="120" y1="124" x2="600" y2="124" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Capability icon row (inline emoji + label groups) -->
  <!-- Four capabilities, custom offsets for equal optical label gaps -->
  <g transform="translate(120, 150)"
     font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
     font-size="12" font-weight="600" letter-spacing="0.3">
    <!-- Simple -->
    <g transform="translate(0, 0)">
      <text x="0" y="15" font-size="14"
            font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif">&#x2728;&#xFE0F;</text>
      <text x="20" y="13" fill="#00d9ff" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.65" stroke-linejoin="round">Simple</text>
    </g>
    <!-- Automatic -->
    <g transform="translate(90, 0)">
      <text x="0" y="15" font-size="14"
            font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif">&#x1F501;&#xFE0F;</text>
      <text x="20" y="13" fill="#00d9ff" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.65" stroke-linejoin="round">Automatic</text>
    </g>
    <!-- Dev-Friendly -->
    <g transform="translate(210, 0)">
      <text x="0" y="15" font-size="14"
            font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif">&#x1F6E0;&#xFE0F;</text>
      <text x="20" y="13" fill="#00d9ff" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.65" stroke-linejoin="round">Dev-Friendly</text>
    </g>
    <!-- <n>+ Tests -->
    <g transform="translate(342, 0)">
      <text x="0" y="15" font-size="14"
            font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif">&#x1F9EA;&#xFE0F;</text>
      <text x="20" y="13" fill="#00d9ff" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.65" stroke-linejoin="round">2200+ Tests</text>
    </g>
  </g>

  <!-- Right-side capability pill badges -->
  <!-- Dark fill, DxMessaging-blue text, semantic borders -->
  <g transform="translate(632, 56)" font-family="'SF Mono', 'Fira Code', monospace" font-size="11">
    <!-- Unity badge: cyan-blue stroke (DxMessaging brand) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="150" height="26" rx="13" ry="13" fill="#1a1a2e" fill-opacity="0.88" stroke="#3a87b8" stroke-width="1.4" stroke-opacity="0.85"/>
      <text x="75" y="17" text-anchor="middle" fill="#00d9ff" font-weight="600" letter-spacing="0.3"><tspan font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', monospace">&#x1F3AE;&#xFE0F;</tspan><tspan dx="2">Unity 2021.3+</tspan></text>
    </g>
    <!-- Zero Alloc badge: green stroke for "no allocations" semantic -->
    <g transform="translate(0, 43)">
      <rect x="0" y="0" width="150" height="26" rx="13" ry="13" fill="#1a1a2e" fill-opacity="0.88" stroke="#2ecc71" stroke-width="1.4" stroke-opacity="0.85"/>
      <text x="75" y="17" text-anchor="middle" fill="#00d9ff" font-weight="600" letter-spacing="0.3"><tspan font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', monospace">&#x2705;&#xFE0F;</tspan><tspan dx="2">Zero Alloc</tspan></text>
    </g>
    <!-- High Perf badge: red stroke ties to version badge accent -->
    <g transform="translate(0, 86)">
      <rect x="0" y="0" width="150" height="26" rx="13" ry="13" fill="#1a1a2e" fill-opacity="0.88" stroke="#e94560" stroke-width="1.4" stroke-opacity="0.85"/>
      <text x="75" y="17" text-anchor="middle" fill="#00d9ff" font-weight="600" letter-spacing="0.3"><tspan font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', monospace">&#x26A1;&#xFE0F;</tspan><tspan dx="2">High Perf</tspan></text>
    </g>
  </g>

  <!-- Version badge (top right) - text must contain vX.Y.Z for version sync -->
  <g transform="translate(720, 18)">
    <rect x="0" y="0" width="62" height="22" rx="11" ry="11" fill="#e94560" opacity="0.95" filter="url(#softShadow)"/>
    <text x="31" y="15" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">v3.0.1</text>
  </g>

  <!-- Wallstop Studios branding (bottom right): right-anchored at x=795,
       explicit y=193 (no dominant-baseline) for legacy renderer robustness. -->
  <text x="782" y="192" text-anchor="end"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#9aa3b8" letter-spacing="0.6"
        paint-order="stroke" stroke="#000000" stroke-width="2" stroke-opacity="0.7" stroke-linejoin="round">Wallstop Studios</text>

</svg>
