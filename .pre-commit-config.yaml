default_install_hook_types:
  - pre-commit
  - pre-push
  - post-checkout
  - post-merge
  - post-rewrite

repos:
  - repo: local
    hooks:
      - id: dotnet-tool-restore
        name: Install .NET tools
        entry: dotnet tool restore
        language: system
        always_run: true
        pass_filenames: false
        stages:
          - pre-commit
          - pre-push
          - post-checkout
          - post-rewrite
        description: Install the .NET tools listed at .config/dotnet-tools.json.
      - id: csharpier
        name: Run CSharpier on C# files
        entry: dotnet tool run csharpier format
        language: system
        types:
          - c#
        description: CSharpier is an opinionated C# formatter inspired by Prettier.

  - repo: local
    hooks:
      - id: sync-banner-version
        name: Sync banner version from package.json
        entry: bash scripts/sync-banner-version.sh
        language: system
        files: '^package\.json$'
        pass_filenames: false
        stages:
          - pre-commit
        description: Sync version from package.json to SVG banner (cosmetic, non-blocking).

  - repo: local
    hooks:
      - id: prettier
        name: Prettier (Markdown, JSON, asmdef, asmref, YAML)
        entry: npx --yes prettier@3.8.1 --write
        language: system
        files: '(?i)\.(md|markdown|json|asmdef|asmref|ya?ml)$'
        description: Use pinned Prettier version to match CI.

  - repo: local
    hooks:
      - id: markdown-structure-fix
        name: Markdown structure auto-fix (headings, fences)
        entry: node scripts/fix-md036-headings.js
        language: system
        files: '(?i)\.(md|markdown)$'
        description: Auto-fix MD036 (no-emphasis-as-heading) by converting bold-only lines to headings.

  - repo: local
    hooks:
      - id: markdown-link-fragment-list-fix
        name: Markdown fragment/list auto-fix (MD051/MD029)
        entry: node scripts/fix-md029-md051.js
        language: system
        files: '(?i)\.(md|markdown)$'
        description: Auto-fix local heading fragment links and normalize ordered-list prefixes to 1.

  - repo: local
    hooks:
      - id: markdownlint
        name: markdownlint (respect repo config)
        entry: npx --yes markdownlint-cli2@0.17.1 --fix
        language: system
        files: '(?i)\.(md|markdown)$'

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: yamllint (pinned)
        args:
          - -c
          - .yamllint.yaml
        files: '(?i)\.(ya?ml)$'
        stages:
          - pre-commit
          - pre-push

  - repo: local
    hooks:
      - id: fix-eol
        name: Normalize mixed EOL policy and strip BOM
        entry: node scripts/fix-eol.js
        language: system
        stages:
          - pre-commit
        pass_filenames: true
        description: Automatically rewrite text files to match CI EOL/BOM policy.
      - id: fix-eol-repo
        name: Normalize mixed EOL policy after checkout/merge
        entry: node scripts/fix-eol.js
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - post-checkout
          - post-merge
          - post-rewrite
        description: Ensure working tree EOLs stay normalized after git operations.

  - repo: local
    hooks:
      - id: eol-bom-check
        name: Enforce mixed EOL policy and no BOM
        entry: node scripts/check-eol.js
        language: system
        pass_filenames: true
        stages:
          - pre-commit
          - pre-push

  - repo: local
    hooks:
      - id: conflict-markers
        name: Fail on merge conflict markers
        entry: bash -lc 'if rg -n -S -g "!**/.git/**" -e "^(<<<<<<<|=======|>>>>>>>)" .; then echo "Conflict markers found. Resolve merges before committing." >&2; exit 1; fi'
        language: system
        pass_filenames: false
        stages:
          - pre-commit

  - repo: local
    hooks:
      - id: validate-skills
        name: Validate LLM skill files
        entry: node scripts/validate-skills.js
        language: system
        pass_filenames: false
        files: '^\.llm/.*\.md$'
        stages:
          - pre-commit
          - pre-push
        description: Validate skill file schema compliance and file size limits.
      - id: skills-index-regen
        name: Regenerate skills index.md
        entry: bash -c 'node scripts/generate-skills-index.js && { git add .llm/skills/index.md 2>/dev/null || true; }'
        language: system
        pass_filenames: false
        files: '^\.llm/.*\.md$'
        stages:
          - pre-commit
        description: Regenerate index.md and stage it for commit.
      - id: skills-index-check
        name: Validate skills index.md is current
        entry: node scripts/generate-skills-index.js --check
        language: system
        pass_filenames: false
        files: '^\.llm/.*\.md$'
        stages:
          - pre-push
        description: Fail push when generated skills index is stale.
      - id: update-llms-txt
        name: Update llms.txt
        entry: bash -c 'node scripts/update-llms-txt.js && { git add llms.txt 2>/dev/null || true; }'
        language: system
        pass_filenames: false
        files: '^(package\.json|llms\.txt|scripts/update-llms-txt\.js|\.llm/skills/.*)$'
        stages:
          - pre-commit
        description: Regenerate llms.txt and stage it when llms inputs change.
      - id: validate-llms-txt
        name: Validate llms.txt generator contract
        entry: npm run validate:llms-txt
        language: system
        pass_filenames: false
        files: '^(package\.json|llms\.txt|scripts/update-llms-txt\.js|scripts/__tests__/update-llms-txt\.test\.js|\.llm/skills/.*)$'
        stages:
          - pre-push
        description: Run llms.txt generator tests and freshness checks before push.

  - repo: local
    hooks:
      - id: validate-npm-meta
        name: Validate NPM package meta files
        entry: node scripts/validate-npm-meta.js --check
        language: system
        pass_filenames: false
        stages:
          - pre-push
        description: Validate that npm package includes all .meta files correctly.

  - repo: local
    hooks:
      - id: validate-vscode-settings
        name: Validate VS Code settings security
        entry: node scripts/validate-vscode-settings.js
        language: system
        pass_filenames: false
        files: '^((\.vscode/settings\.json)|(scripts/validate-vscode-settings\.js)|(scripts/__tests__/validate-vscode-settings\.test\.js)|(\.pre-commit-config\.yaml)|(\.github/workflows/llm-policy-check\.yml))$'
        stages:
          - pre-commit
          - pre-push
        description: Reject committed terminal auto-approval settings in repository VS Code config.
      - id: validate-pre-commit-tooling
        name: Validate pre-commit Node tooling policy
        entry: node scripts/validate-pre-commit-tooling.js
        language: system
        pass_filenames: false
        files: '^((\.pre-commit-config\.yaml)|(scripts/validate-pre-commit-tooling\.js)|(scripts/run-managed-jest\.js)|(scripts/__tests__/validate-pre-commit-tooling\.test\.js)|(scripts/__tests__/run-managed-jest\.test\.js))$'
        stages:
          - pre-commit
          - pre-push
        description: Enforce explicit npx install policy and managed Jest wrapper usage in local hooks.
      - id: validate-lychee-config
        name: Validate lychee configuration
        entry: node scripts/validate-lychee-config.js
        language: system
        pass_filenames: false
        files: '^\.lychee\.toml$'
        stages:
          - pre-commit
          - pre-push
        description: Validate .lychee.toml fields against lychee v0.23.0 valid options.
      - id: script-parser-tests
        name: Run parser script tests
        entry: >-
          node scripts/run-managed-jest.js --runTestsByPath scripts/__tests__/validate-lychee-config.test.js
          scripts/__tests__/generate-skills-index.test.js
          scripts/__tests__/validate-skills-required-fields.test.js
          scripts/__tests__/validate-workflows.test.js
          scripts/__tests__/check-eol.test.js
          scripts/__tests__/quote-parser.test.js
          scripts/__tests__/validate-skills-llm-policy.test.js
          scripts/__tests__/update-llms-txt.test.js
          scripts/__tests__/fix-md029-md051.test.js
          scripts/__tests__/validate-vscode-settings.test.js
          scripts/__tests__/validate-pre-commit-tooling.test.js
          scripts/__tests__/run-managed-jest.test.js
          scripts/__tests__/verify-managed-jest-fallback.test.js
        language: system
        pass_filenames: false
        files: '^(\.gitattributes|CONTRIBUTING\.md|\.vscode/settings\.json|\.github/workflows/(llm-policy-check|pre-commit-tooling-check)\.yml|scripts/check-eol\.ps1|scripts/(check-eol|fix-eol|fix-md029-md051|validate-lychee-config|validate-skills|generate-skills-index|validate-workflows|update-llms-txt|validate-vscode-settings|validate-pre-commit-tooling|run-managed-jest|verify-managed-jest-fallback)\.js|scripts/lib/(quote-parser|eol-policy)\.js|scripts/__tests__/(check-eol|fix-md029-md051|validate-lychee-config|validate-skills-required-fields|validate-skills-llm-policy|generate-skills-index|validate-workflows|quote-parser|update-llms-txt|validate-vscode-settings|validate-pre-commit-tooling|run-managed-jest|verify-managed-jest-fallback)\.test\.js)$'
        stages:
          - pre-commit
        description: Fail fast on parser and llms generator regressions (quote handling, frontmatter/TOML parsing, newline normalization) before push.

  - repo: local
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflows
        entry: bash -c 'if command -v actionlint >/dev/null 2>&1; then actionlint; else echo "actionlint not installed; skipping"; fi'
        language: system
        files: '^\.github/workflows/.*\.ya?ml$'
        pass_filenames: false
        stages:
          - pre-push
        description: Validate GitHub Actions workflow syntax before push.
      - id: script-tests
        name: Run JavaScript script tests
        entry: node scripts/run-managed-jest.js
        language: system
        pass_filenames: false
        files: '^(package\.json|package-lock\.json|scripts/.*\.js|scripts/__tests__/.*\.js)$'
        stages:
          - pre-push
        description: Run Jest script tests before push when script files change.

  - repo: local
    hooks:
      - id: cspell
        name: Check spelling
        entry: npx --yes cspell@9 --no-progress --no-summary
        language: system
        files: '(?i)\.(md|cs|json|ya?ml|ps1|js)$'
        pass_filenames: true
        stages:
          - pre-push
        description: Check spelling in changed files before push.
